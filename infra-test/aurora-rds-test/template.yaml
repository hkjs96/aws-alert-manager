AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Aurora MySQL Serverless v2 minimal test infra.
  Validates AuroraRDS alarm auto-creation with Monitoring=on tag.
  Delete stack immediately after testing to save cost.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC for Aurora cluster
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 subnets in different AZs (DB Subnet Group requirement)
  MasterUsername:
    Type: String
    Default: admin
    Description: DB master username
  MasterUserPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: DB master password (min 8 chars)

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${AWS::StackName} Aurora test subnet group'
      SubnetIds: !Ref SubnetIds
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-subnet-group'

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} Aurora test SG (no inbound)'
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-sg'

  AuroraCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Delete
    Properties:
      DBClusterIdentifier: !Sub '${AWS::StackName}-cluster'
      Engine: aurora-mysql
      EngineVersion: '8.0.mysql_aurora.3.08.0'
      MasterUsername: !Ref MasterUsername
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5
        MaxCapacity: 1
      BackupRetentionPeriod: 1
      DeletionProtection: false
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: !Sub '${AWS::StackName}-cluster'

  AuroraInstance:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${AWS::StackName}-writer'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.serverless
      Engine: aurora-mysql
      PubliclyAccessible: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${AWS::StackName}-writer'
        - Key: Threshold_CPU
          Value: '90'
        - Key: Threshold_FreeLocalStorageGB
          Value: '5'

Outputs:
  ClusterId:
    Description: Aurora cluster ID
    Value: !Ref AuroraCluster
  ClusterEndpoint:
    Description: Aurora cluster endpoint
    Value: !GetAtt AuroraCluster.Endpoint.Address
  WriterInstanceId:
    Description: Aurora writer instance ID (Monitoring=on)
    Value: !Ref AuroraInstance
