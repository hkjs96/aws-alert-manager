AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  ALB + RDS 메트릭 확장 테스트 인프라.
  ALB(ELB4XX, TargetConnectionError) + RDS(ConnectionAttempts) 알람 생성 검증용.

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues: [dev, stg, prod]

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID

  SubnetId1:
    Type: AWS::EC2::Subnet::Id
    Description: 퍼블릭 서브넷 1 (AZ-a)

  SubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: 퍼블릭 서브넷 2 (AZ-b)

  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: RDS master password (8자 이상)

Resources:
  # --- Security Groups ---
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-sg-alb-metric-test'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-sg-alb-metric-test'

  RdsSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-sg-rds-metric-test'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/8
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-sg-rds-metric-test'

  # --- ALB (Monitoring=on, 새 메트릭 알람 테스트) ---
  TestAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${Environment}-alb-metric-test'
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Ref SubnetId1
        - !Ref SubnetId2
      SecurityGroups:
        - !Ref AlbSg
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-alb-metric-test'

  AlbTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${Environment}-tg-metric-test'
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VpcId
      TargetType: ip
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-tg-metric-test'

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref TestAlb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '200'
            ContentType: application/json
            MessageBody: '{"status":"ok"}'

  # --- RDS Subnet Group ---
  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${Environment}-rds-metric-test-subnet-group'
      SubnetIds:
        - !Ref SubnetId1
        - !Ref SubnetId2
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-rds-metric-test-subnet-group'

  # --- RDS (Monitoring=on, ConnectionAttempts 알람 테스트) ---
  TestRds:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${Environment}-rds-metric-test'
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: '8.0'
      AllocatedStorage: 20
      MasterUsername: admin
      MasterUserPassword: !Ref DBMasterPassword
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups:
        - !Ref RdsSg
      PubliclyAccessible: false
      MultiAZ: false
      StorageType: gp3
      BackupRetentionPeriod: 0
      DeletionProtection: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-rds-metric-test'

Outputs:
  AlbArn:
    Description: ALB ARN
    Value: !Ref TestAlb

  AlbDnsName:
    Description: ALB DNS
    Value: !GetAtt TestAlb.DNSName

  RdsEndpoint:
    Description: RDS Endpoint
    Value: !GetAtt TestRds.Endpoint.Address

  RdsInstanceId:
    Description: RDS Instance ID
    Value: !Ref TestRds
