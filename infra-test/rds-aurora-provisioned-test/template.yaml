AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  RDS MySQL + Aurora Provisioned (writer+reader) test infra.
  Validates: RDS alarms, Aurora provisioned variant routing,
  percentage-based FreeMemory, dynamic alarms with LT_ prefix.

Parameters:
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: At least 2 subnets in different AZs
  MasterUserPassword:
    Type: String
    NoEcho: true
    MinLength: 8

Resources:
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${AWS::StackName} test subnet group'
      SubnetIds: !Ref SubnetIds

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${AWS::StackName} test SG (no inbound)'
      VpcId: !Ref VpcId

  # --- Regular RDS MySQL (non-Aurora) ---
  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub '${AWS::StackName}-rds'
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: '8.0'
      MasterUsername: admin
      MasterUserPassword: !Ref MasterUserPassword
      AllocatedStorage: 20
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      PubliclyAccessible: false
      DeletionProtection: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${AWS::StackName}-rds'
        - Key: Threshold_CommitLatency
          Value: '100'

  # --- Aurora Provisioned Cluster (writer + reader) ---
  AuroraCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Delete
    Properties:
      DBClusterIdentifier: !Sub '${AWS::StackName}-aurora-cluster'
      Engine: aurora-mysql
      EngineVersion: '8.0.mysql_aurora.3.08.0'
      MasterUsername: admin
      MasterUserPassword: !Ref MasterUserPassword
      DBSubnetGroupName: !Ref DBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DBSecurityGroup
      BackupRetentionPeriod: 1
      DeletionProtection: false
      StorageEncrypted: true

  AuroraWriter:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${AWS::StackName}-aurora-writer'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.medium
      Engine: aurora-mysql
      PubliclyAccessible: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${AWS::StackName}-aurora-writer'
        - Key: Threshold_CPU
          Value: '90'
        - Key: Threshold_CommitLatency
          Value: '200'
        - Key: Threshold_LT_BufferCacheHitRatio
          Value: '95'

  AuroraReader:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${AWS::StackName}-aurora-reader'
      DBClusterIdentifier: !Ref AuroraCluster
      DBInstanceClass: db.t3.medium
      Engine: aurora-mysql
      PubliclyAccessible: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${AWS::StackName}-aurora-reader'

Outputs:
  RDSInstanceId:
    Value: !Ref RDSInstance
  AuroraWriterId:
    Value: !Ref AuroraWriter
  AuroraReaderId:
    Value: !Ref AuroraReader
  TestChecklist:
    Value: >-
      1) RDS: 6 hardcoded alarms + 1 dynamic (CommitLatency)
      2) Aurora Writer: 5 hardcoded (CPU,FreeMemoryGB,Connections,FreeLocalStorageGB,ReplicaLag)
         + 2 dynamic (CommitLatency >200, BufferCacheHitRatio <95)
         + FreeMemoryGB uses 20% of 4GiB = 0.8GB threshold
      3) Aurora Reader: 5 hardcoded (CPU,FreeMemoryGB,Connections,FreeLocalStorageGB,ReaderReplicaLag)
      4) Delete stack -> orphan alarm cleanup
