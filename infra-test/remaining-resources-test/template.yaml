AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  E2E Remaining-Resources Test Infra.
  Lambda + APIGW REST/HTTP/WebSocket + VPN + ACM + AWS Backup + Amazon MQ +
  CLB + OpenSearch. All resources tagged Monitoring=on for alarm auto-creation.
  Estimated cost ~$0.17/hr - delete stack immediately after testing.

Parameters:
  Environment:
    Type: String
    Default: dev
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId1:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet AZ-a (public, for CLB/EC2)
  SubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet AZ-b (public, for CLB)
  MQPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    Description: Amazon MQ broker admin password
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: Amazon Linux 2023 AMI ID

Resources:
  # ============================================================
  # IAM Roles
  # ============================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-e2e-remaining-lambda-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref LambdaFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com

  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-e2e-remaining-backup-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup

  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-e2e-remaining-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2Role

  # ============================================================
  # Security Groups
  # ============================================================
  ClbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-remaining-clb-sg'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  Ec2Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-remaining-ec2-sg'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref ClbSg
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  # ============================================================
  # Lambda Function
  # ============================================================
  LambdaFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-e2e-remaining-lambda'
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      ReservedConcurrentExecutions: 2
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": '{"status":"ok"}'}
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-remaining-lambda'
        - Key: Threshold_Invocations
          Value: '1000'

  # ============================================================
  # API Gateway REST API
  # ============================================================
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub '${Environment}-e2e-rest-api'
      Tags:
        - Key: Monitoring
          Value: 'on'

  RestApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub 'arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${LambdaFunction.Arn}/invocations'

  RestApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: RestApiMethod
    Properties:
      RestApiId: !Ref RestApi

  RestApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref RestApiDeployment
      StageName: dev

  # ============================================================
  # API Gateway HTTP API
  # ============================================================
  HttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${Environment}-e2e-http-api'
      ProtocolType: HTTP
      Tags:
        Monitoring: 'on'

  HttpApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref HttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt LambdaFunction.Arn
      PayloadFormatVersion: '2.0'

  HttpApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref HttpApi
      RouteKey: $default
      Target: !Sub 'integrations/${HttpApiIntegration}'

  HttpApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref HttpApi
      StageName: $default
      AutoDeploy: true

  # ============================================================
  # API Gateway WebSocket API
  # ============================================================
  WsApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub '${Environment}-e2e-ws-api'
      ProtocolType: WEBSOCKET
      RouteSelectionExpression: $request.body.action
      Tags:
        Monitoring: 'on'

  WsIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref WsApi
      IntegrationType: MOCK
      RequestTemplates:
        '200': '{"statusCode":200}'

  WsConnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WsApi
      RouteKey: $connect
      Target: !Sub 'integrations/${WsIntegration}'

  WsDisconnectRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WsApi
      RouteKey: $disconnect
      Target: !Sub 'integrations/${WsIntegration}'

  WsDefaultRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref WsApi
      RouteKey: $default
      Target: !Sub 'integrations/${WsIntegration}'

  WsDeployment:
    Type: AWS::ApiGatewayV2::Deployment
    DependsOn:
      - WsConnectRoute
      - WsDisconnectRoute
      - WsDefaultRoute
    Properties:
      ApiId: !Ref WsApi

  WsStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref WsApi
      StageName: dev
      DeploymentId: !Ref WsDeployment

  # ============================================================
  # VPN
  # ============================================================
  VpnGateway:
    Type: AWS::EC2::VPNGateway
    Properties:
      Type: ipsec.1
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-e2e-remaining-vgw'

  VpnGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VpcId
      VpnGatewayId: !Ref VpnGateway

  CustomerGateway:
    Type: AWS::EC2::CustomerGateway
    Properties:
      IpAddress: 203.0.113.1
      Type: ipsec.1
      BgpAsn: 65000
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-e2e-remaining-cgw'

  VpnConnection:
    Type: AWS::EC2::VPNConnection
    DependsOn: VpnGatewayAttachment
    Properties:
      Type: ipsec.1
      VpnGatewayId: !Ref VpnGateway
      CustomerGatewayId: !Ref CustomerGateway
      StaticRoutesOnly: true
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-remaining-vpn'

  # ============================================================
  # ACM Certificate (self-signed import via Custom Resource)
  # ============================================================
  AcmImportRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-e2e-remaining-acm-import-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: AcmImport
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - acm:ImportCertificate
                  - acm:DeleteCertificate
                  - acm:AddTagsToCertificate
                Resource: '*'

  AcmImportFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-e2e-acm-import'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 30
      Role: !GetAtt AcmImportRole.Arn
      Code:
        ZipFile: |
          import json
          import subprocess
          import urllib.request
          import boto3

          def send_response(event, context, status, data=None):
              body = json.dumps({
                  "Status": status,
                  "Reason": f"See CloudWatch Log Stream: {context.log_stream_name}",
                  "PhysicalResourceId": data.get("CertificateArn", "none") if data else "none",
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body,
                  headers={"Content-Type": ""}, method="PUT")
              urllib.request.urlopen(req)

          def handler(event, context):
              try:
                  if event["RequestType"] == "Delete":
                      arn = event.get("PhysicalResourceId", "")
                      if arn.startswith("arn:"):
                          boto3.client("acm").delete_certificate(CertificateArn=arn)
                      send_response(event, context, "SUCCESS", {"CertificateArn": arn})
                      return
                  # Create/Update: generate self-signed cert (30 days)
                  subprocess.run(["openssl", "req", "-x509", "-newkey", "rsa:2048",
                      "-keyout", "/tmp/key.pem", "-out", "/tmp/cert.pem",
                      "-days", "30", "-nodes", "-subj", "/CN=e2e-test.internal"],
                      check=True, capture_output=True)
                  with open("/tmp/cert.pem") as f: cert = f.read()
                  with open("/tmp/key.pem") as f: key = f.read()
                  acm = boto3.client("acm")
                  tags = json.loads(event["ResourceProperties"].get("Tags", "[]"))
                  resp = acm.import_certificate(Certificate=cert, PrivateKey=key)
                  arn = resp["CertificateArn"]
                  if tags:
                      acm.add_tags_to_certificate(CertificateArn=arn, Tags=tags)
                  send_response(event, context, "SUCCESS", {"CertificateArn": arn})
              except Exception as e:
                  print(f"Error: {e}")
                  send_response(event, context, "FAILED")

  AcmCertificate:
    Type: Custom::AcmImport
    Properties:
      ServiceToken: !GetAtt AcmImportFunction.Arn
      Tags: !Sub '[{"Key":"Monitoring","Value":"on"},{"Key":"Name","Value":"${Environment}-e2e-remaining-acm"}]'

  # ============================================================
  # AWS Backup
  # ============================================================
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${Environment}-e2e-remaining-backup-target'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub '${Environment}-e2e-backup-vault'
      BackupVaultTags:
        Monitoring: 'on'

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub '${Environment}-e2e-backup-plan'
        BackupPlanRule:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: 'cron(0 5 ? * * *)'
            Lifecycle:
              DeleteAfterDays: 1

  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub '${Environment}-e2e-backup-selection'
        IamRoleArn: !GetAtt BackupRole.Arn
        Resources:
          - !GetAtt DynamoDBTable.Arn

  # ============================================================
  # Amazon MQ (ActiveMQ)
  # ============================================================
  MqBroker:
    Type: AWS::AmazonMQ::Broker
    Properties:
      BrokerName: !Sub '${Environment}-e2e-remaining-mq'
      EngineType: ACTIVEMQ
      EngineVersion: '5.18'
      HostInstanceType: mq.t3.micro
      DeploymentMode: SINGLE_INSTANCE
      PubliclyAccessible: true
      Users:
        - Username: admin
          Password: !Ref MQPassword
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-remaining-mq'
        - Key: Threshold_TotalMessageCount
          Value: '500'

  # ============================================================
  # Classic Load Balancer + EC2 Target
  # ============================================================
  ClbEc2Instance:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId1
          AssociatePublicIpAddress: true
          GroupSet:
            - !Ref Ec2Sg
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y httpd
          INSTANCE_ID=$(ec2-metadata -i | awk '{print $2}')
          cat > /var/www/html/index.html <<EOF
          {"instance":"$INSTANCE_ID","status":"ok"}
          EOF
          systemctl enable httpd && systemctl start httpd
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-remaining-clb-ec2'

  ClassicLoadBalancer:
    Type: AWS::ElasticLoadBalancing::LoadBalancer
    Properties:
      LoadBalancerName: !Sub '${Environment}-e2e-clb'
      Scheme: internet-facing
      Subnets:
        - !Ref SubnetId1
        - !Ref SubnetId2
      SecurityGroups:
        - !Ref ClbSg
      Listeners:
        - Protocol: HTTP
          LoadBalancerPort: 80
          InstanceProtocol: HTTP
          InstancePort: 80
      HealthCheck:
        Target: 'HTTP:80/'
        Interval: 30
        Timeout: 5
        UnhealthyThreshold: 2
        HealthyThreshold: 2
      Instances:
        - !Ref ClbEc2Instance
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-clb'

  # ============================================================
  # OpenSearch Domain
  # ============================================================
  OpenSearchDomain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: !Sub '${Environment}-e2e-opensearch'
      EngineVersion: OpenSearch_2.11
      ClusterConfig:
        InstanceType: t3.small.search
        InstanceCount: 1
        DedicatedMasterEnabled: false
      EBSOptions:
        EBSEnabled: true
        VolumeType: gp3
        VolumeSize: 10
      AccessPolicies:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub 'arn:aws:iam::${AWS::AccountId}:root'
            Action: 'es:*'
            Resource: !Sub 'arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${Environment}-e2e-opensearch/*'
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-opensearch'

Outputs:
  LambdaFunctionName:
    Value: !Ref LambdaFunction
  RestApiUrl:
    Value: !Sub 'https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/dev'
  HttpApiUrl:
    Value: !GetAtt HttpApi.ApiEndpoint
  WsApiUrl:
    Value: !Sub 'wss://${WsApi}.execute-api.${AWS::Region}.amazonaws.com/dev'
  VpnConnectionId:
    Value: !Ref VpnConnection
  AcmCertificateArn:
    Value: !GetAtt AcmCertificate.CertificateArn
  BackupVaultName:
    Value: !Ref BackupVault
  BackupRoleArn:
    Value: !GetAtt BackupRole.Arn
  DynamoDBTableArn:
    Value: !GetAtt DynamoDBTable.Arn
  MqBrokerId:
    Value: !Ref MqBroker
  MqBrokerName:
    Value: !Sub '${Environment}-e2e-remaining-mq'
  ClbDnsName:
    Value: !GetAtt ClassicLoadBalancer.DNSName
  ClbName:
    Value: !Ref ClassicLoadBalancer
  OpenSearchDomainName:
    Value: !Ref OpenSearchDomain
  OpenSearchEndpoint:
    Value: !GetAtt OpenSearchDomain.DomainEndpoint
  ExpectedAlarms:
    Value: >-
      Lambda:2 (Duration,Errors)
      VPN:1 (TunnelState)
      APIGW REST:3 (ApiLatency,Api4XXError,Api5XXError)
      APIGW HTTP:3 (ApiLatency,Api4xx,Api5xx)
      APIGW WebSocket:4 (WsConnectCount,WsMessageCount,WsIntegrationError,WsExecutionError)
      ACM:1 (DaysToExpiry)
      Backup:2 (BackupJobsFailed,BackupJobsAborted)
      MQ:4 (MqCPU,HeapUsage,JobSchedulerStoreUsage,StoreUsage)
      CLB:7 (CLBUnHealthyHost,CLB5XX,CLB4XX,CLBBackend5XX,CLBBackend4XX,SurgeQueueLength,SpilloverCount)
      OpenSearch:8 (ClusterStatusRed,ClusterStatusYellow,OSFreeStorageSpace,ClusterIndexWritesBlocked,OsCPU,JVMMemoryPressure,MasterCPU,MasterJVMMemoryPressure)
      Total: ~35 alarms
