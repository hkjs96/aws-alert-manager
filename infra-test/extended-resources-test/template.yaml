AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  Extended Resources E2E Test - 11 resource types (DX excluded, requires physical connection).
  SQS, ECS, MSK, DynamoDB, CloudFront, WAF, Route53, EFS, S3, SageMaker, SNS.
  All resources tagged Monitoring=on for alarm auto-creation.
  Estimated cost ~$0.20/hr - DELETE IMMEDIATELY after testing.

Parameters:
  Environment:
    Type: String
    Default: dev
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId1:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet AZ-a (public, for ECS/MSK/WAF ALB/EFS)
  SubnetId2:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet AZ-b (public, for MSK/WAF ALB)

Resources:
  # ============================================================
  # IAM Roles
  # ============================================================
  EcsTaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-e2e-extended-ecs-exec-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  SageMakerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-e2e-extended-sagemaker-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: sagemaker.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSageMakerFullAccess
      Policies:
        - PolicyName: S3ModelAccess
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt SageMakerModelBucket.Arn
                  - !Sub '${SageMakerModelBucket.Arn}/*'

  S3CleanupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-e2e-extended-s3-cleanup-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Cleanup
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource: '*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  # ============================================================
  # Security Groups
  # ============================================================
  EcsSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-extended-ecs-sg'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  MskSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-extended-msk-sg'
      VpcId: !Ref VpcId

  MskSecurityGroupIngress9092:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref MskSecurityGroup
      IpProtocol: tcp
      FromPort: 9092
      ToPort: 9092
      SourceSecurityGroupId: !Ref MskSecurityGroup

  MskSecurityGroupIngress9094:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref MskSecurityGroup
      IpProtocol: tcp
      FromPort: 9094
      ToPort: 9094
      SourceSecurityGroupId: !Ref MskSecurityGroup

  WafAlbSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-extended-waf-alb-sg'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  EfsMountTargetSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-extended-efs-mt-sg'
      VpcId: !Ref VpcId

  EfsMountTargetSecurityGroupIngress:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !Ref EfsMountTargetSecurityGroup
      IpProtocol: tcp
      FromPort: 2049
      ToPort: 2049
      SourceSecurityGroupId: !Ref EfsMountTargetSecurityGroup

  # ============================================================
  # SQS
  # ============================================================
  SqsQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub '${Environment}-e2e-extended-sqs'
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-sqs'

  # ============================================================
  # ECS Fargate
  # ============================================================
  EcsCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub '${Environment}-e2e-extended-ecs-cluster'

  EcsLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub '/ecs/${Environment}-e2e-extended-nginx'
      RetentionInDays: 1

  EcsTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub '${Environment}-e2e-extended-nginx'
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: '256'
      Memory: '512'
      ExecutionRoleArn: !GetAtt EcsTaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: nginx
          Image: public.ecr.aws/nginx/nginx:latest
          PortMappings:
            - ContainerPort: 80
          Essential: true
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref EcsLogGroup
              awslogs-region: !Ref 'AWS::Region'
              awslogs-stream-prefix: nginx

  EcsService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub '${Environment}-e2e-extended-ecs-svc'
      Cluster: !Ref EcsCluster
      TaskDefinition: !Ref EcsTaskDefinition
      LaunchType: FARGATE
      DesiredCount: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets:
            - !Ref SubnetId1
          SecurityGroups:
            - !Ref EcsSecurityGroup
          AssignPublicIp: ENABLED
      EnableECSManagedTags: true
      PropagateTags: SERVICE
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-ecs-svc'

  # ============================================================
  # SNS
  # ============================================================
  SnsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub '${Environment}-e2e-extended-sns'
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-sns'

  # ============================================================
  # MSK (COST WARNING: ~$0.08/hr for kafka.t3.small x 2 brokers)
  # Creation: 15-25 min, Deletion: 10-15 min
  # ============================================================
  MskCluster:
    Type: AWS::MSK::Cluster
    Properties:
      ClusterName: !Sub '${Environment}-e2e-extended-msk'
      KafkaVersion: '3.5.1'
      NumberOfBrokerNodes: 2
      BrokerNodeGroupInfo:
        InstanceType: kafka.t3.small
        ClientSubnets:
          - !Ref SubnetId1
          - !Ref SubnetId2
        StorageInfo:
          EBSStorageInfo:
            VolumeSize: 10
        SecurityGroups:
          - !Ref MskSecurityGroup
      Tags:
        Monitoring: 'on'
        Name: !Sub '${Environment}-e2e-extended-msk'

  # ============================================================
  # DynamoDB
  # ============================================================
  DynamoDBTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub '${Environment}-e2e-extended-dynamodb'
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-dynamodb'

  # ============================================================
  # CloudFront + S3 Origin
  # CloudFront metrics are published in us-east-1 only.
  # Creation: 5-15 min, Deletion: 5-10 min
  # ============================================================
  CloudFrontOriginBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${Environment}-e2e-extended-cf-origin-${AWS::AccountId}'
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  CloudFrontOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub '${Environment}-e2e-extended-cf-oac'
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt CloudFrontOriginBucket.RegionalDomainName
            OriginAccessControlId: !GetAtt CloudFrontOAC.Id
            S3OriginConfig:
              OriginAccessIdentity: ''
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: allow-all
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-cf'

  CloudFrontBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref CloudFrontOriginBucket
      PolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Sid: AllowCloudFrontOAC
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub '${CloudFrontOriginBucket.Arn}/*'
            Condition:
              StringEquals:
                'AWS:SourceArn': !Sub 'arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}'

  # ============================================================
  # WAF + ALB
  # ============================================================
  WafWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub '${Environment}-e2e-extended-waf'
      Scope: REGIONAL
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub '${Environment}-e2e-extended-waf'
      Rules:
        - Name: RateLimit
          Priority: 1
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              Limit: 2000
              AggregateKeyType: IP
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: !Sub '${Environment}-e2e-extended-waf-rate'
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-waf'

  WafAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${Environment}-e2e-ext-waf-alb'
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref SubnetId1
        - !Ref SubnetId2
      SecurityGroups:
        - !Ref WafAlbSecurityGroup

  WafAlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref WafAlb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: fixed-response
          FixedResponseConfig:
            StatusCode: '200'
            ContentType: text/plain
            MessageBody: 'OK'

  WafWebAclAssociation:
    Type: AWS::WAFv2::WebACLAssociation
    Properties:
      ResourceArn: !Ref WafAlb
      WebACLArn: !GetAtt WafWebAcl.Arn

  # ============================================================
  # Route53
  # Route53 metrics are published in us-east-1 only.
  # ============================================================
  Route53HealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        Type: HTTP
        FullyQualifiedDomainName: !GetAtt WafAlb.DNSName
        Port: 80
        ResourcePath: /
        RequestInterval: 30
        FailureThreshold: 3
      HealthCheckTags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-r53-hc'

  # ============================================================
  # EFS
  # ============================================================
  EfsFileSystem:
    Type: AWS::EFS::FileSystem
    Properties:
      ThroughputMode: bursting
      FileSystemTags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-efs'

  EfsMountTarget:
    Type: AWS::EFS::MountTarget
    Properties:
      FileSystemId: !Ref EfsFileSystem
      SubnetId: !Ref SubnetId1
      SecurityGroups:
        - !Ref EfsMountTargetSecurityGroup

  # ============================================================
  # S3 (Request Metrics)
  # Request Metrics take ~15 min to start publishing after activation.
  # ============================================================
  S3Bucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${Environment}-e2e-extended-s3-${AWS::AccountId}'
      MetricsConfigurations:
        - Id: EntireBucket
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-s3'

  S3CleanupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-e2e-extended-s3-cleanup'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 300
      Role: !GetAtt S3CleanupRole.Arn
      Code:
        ZipFile: |
          import json
          import urllib.request
          import boto3

          def send_response(event, context, status, data=None):
              body = json.dumps({
                  "Status": status,
                  "Reason": "See CloudWatch Log Stream: " + context.log_stream_name,
                  "PhysicalResourceId": event.get("PhysicalResourceId", "cleanup"),
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body,
                  headers={"Content-Type": ""}, method="PUT")
              urllib.request.urlopen(req)

          def handler(event, context):
              try:
                  if event["RequestType"] == "Delete":
                      bucket = event["ResourceProperties"]["BucketName"]
                      s3 = boto3.resource("s3")
                      bucket_resource = s3.Bucket(bucket)
                      bucket_resource.objects.all().delete()
                      bucket_resource.object_versions.all().delete()
                  send_response(event, context, "SUCCESS")
              except Exception as e:
                  print("Error: " + str(e))
                  send_response(event, context, "SUCCESS")

  S3CleanupCustomResource:
    Type: Custom::S3Cleanup
    Properties:
      ServiceToken: !GetAtt S3CleanupFunction.Arn
      BucketName: !Ref S3Bucket

  # ============================================================
  # SageMaker (COST WARNING: ~$0.065/hr for ml.t2.medium)
  # Endpoint creation: 5-10 min
  # ============================================================
  SageMakerModelBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub '${Environment}-e2e-extended-sm-model-${AWS::AccountId}'

  SageMakerModelUploadRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-e2e-extended-sm-upload-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Upload
          PolicyDocument:
            Version: '2012-10-17'
            Statement:
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:DeleteObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt SageMakerModelBucket.Arn
                  - !Sub '${SageMakerModelBucket.Arn}/*'
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: '*'

  SageMakerModelUploadFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub '${Environment}-e2e-extended-sm-model-upload'
      Runtime: python3.12
      Handler: index.handler
      Timeout: 60
      Role: !GetAtt SageMakerModelUploadRole.Arn
      Code:
        ZipFile: |
          import json
          import urllib.request
          import boto3
          import tarfile
          import io

          def send_response(event, context, status, data=None):
              body = json.dumps({
                  "Status": status,
                  "Reason": "See CloudWatch Log Stream: " + context.log_stream_name,
                  "PhysicalResourceId": event.get("PhysicalResourceId", "model-upload"),
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": data or {},
              }).encode()
              req = urllib.request.Request(event["ResponseURL"], data=body,
                  headers={"Content-Type": ""}, method="PUT")
              urllib.request.urlopen(req)

          def handler(event, context):
              try:
                  bucket = event["ResourceProperties"]["BucketName"]
                  key = event["ResourceProperties"]["Key"]
                  if event["RequestType"] in ("Create", "Update"):
                      buf = io.BytesIO()
                      with tarfile.open(fileobj=buf, mode="w:gz") as tar:
                          info = tarfile.TarInfo(name="model.pkl")
                          info.size = 0
                          tar.addfile(info, io.BytesIO(b""))
                      buf.seek(0)
                      boto3.client("s3").put_object(
                          Bucket=bucket, Key=key, Body=buf.read())
                  elif event["RequestType"] == "Delete":
                      try:
                          boto3.client("s3").delete_object(Bucket=bucket, Key=key)
                      except Exception:
                          pass
                  send_response(event, context, "SUCCESS",
                      {"S3Uri": "s3://" + bucket + "/" + key})
              except Exception as e:
                  print("Error: " + str(e))
                  send_response(event, context, "SUCCESS")

  SageMakerModelUpload:
    Type: Custom::SageMakerModelUpload
    Properties:
      ServiceToken: !GetAtt SageMakerModelUploadFunction.Arn
      BucketName: !Ref SageMakerModelBucket
      Key: model/model.tar.gz

  SageMakerModelBucketCleanup:
    Type: Custom::S3Cleanup
    Properties:
      ServiceToken: !GetAtt S3CleanupFunction.Arn
      BucketName: !Ref SageMakerModelBucket

  CloudFrontOriginBucketCleanup:
    Type: Custom::S3Cleanup
    Properties:
      ServiceToken: !GetAtt S3CleanupFunction.Arn
      BucketName: !Ref CloudFrontOriginBucket

  SageMakerModel:
    Type: AWS::SageMaker::Model
    DependsOn: SageMakerModelUpload
    Properties:
      ModelName: !Sub '${Environment}-e2e-extended-sm-model'
      ExecutionRoleArn: !GetAtt SageMakerRole.Arn
      PrimaryContainer:
        Image: 366743142698.dkr.ecr.ap-northeast-2.amazonaws.com/sagemaker-scikit-learn:1.2-1-cpu-py3
        ModelDataUrl: !Sub 's3://${SageMakerModelBucket}/model/model.tar.gz'

  SageMakerEndpointConfig:
    Type: AWS::SageMaker::EndpointConfig
    Properties:
      EndpointConfigName: !Sub '${Environment}-e2e-extended-sm-ep-config'
      ProductionVariants:
        - VariantName: AllTraffic
          ModelName: !GetAtt SageMakerModel.ModelName
          InstanceType: ml.t2.medium
          InitialInstanceCount: 1

  SageMakerEndpoint:
    Type: AWS::SageMaker::Endpoint
    Properties:
      EndpointName: !Sub '${Environment}-e2e-extended-sm-endpoint'
      EndpointConfigName: !GetAtt SageMakerEndpointConfig.EndpointConfigName
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-extended-sm-endpoint'

Outputs:
  SqsQueueName:
    Value: !GetAtt SqsQueue.QueueName
  SqsQueueUrl:
    Value: !Ref SqsQueue
  EcsClusterName:
    Value: !Ref EcsCluster
  EcsServiceName:
    Value: !GetAtt EcsService.Name
  MskClusterName:
    Value: !Ref MskCluster
  MskClusterArn:
    Value: !GetAtt MskCluster.Arn
  DynamoDBTableName:
    Value: !Ref DynamoDBTable
  CloudFrontDistributionId:
    Value: !Ref CloudFrontDistribution
  CloudFrontDomainName:
    Value: !GetAtt CloudFrontDistribution.DomainName
  WafWebAclName:
    Value: !Ref WafWebAcl
  WafAlbDns:
    Value: !GetAtt WafAlb.DNSName
  Route53HealthCheckId:
    Value: !Ref Route53HealthCheck
  EfsFileSystemId:
    Value: !Ref EfsFileSystem
  S3BucketName:
    Value: !Ref S3Bucket
  SageMakerEndpointName:
    Value: !GetAtt SageMakerEndpoint.EndpointName
  SnsTopicName:
    Value: !GetAtt SnsTopic.TopicName
  SnsTopicArn:
    Value: !Ref SnsTopic
  ExpectedAlarms:
    Description: >-
      SQS:3 (MessagesVisible,OldestMessage,MessagesSent)
      ECS:3 (CPU,Memory,RunningTaskCount)
      MSK:4 (OffsetLag,BytesInPerSec,UnderReplicatedPartitions,ActiveControllerCount)
      DDB:4 (ReadCapacity,WriteCapacity,ThrottledRequests,SystemErrors)
      CF:4 (5xxErrorRate,4xxErrorRate,Requests,BytesDownloaded)
      WAF:3 (BlockedRequests,AllowedRequests,CountedRequests)
      R53:1 (HealthCheckStatus)
      EFS:3 (BurstCreditBalance,PercentIOLimit,ClientConnections)
      S3:4 (4xxErrors,5xxErrors,BucketSizeBytes,NumberOfObjects)
      SM:4 (Invocations,InvocationErrors,ModelLatency,CPU)
      SNS:2 (NotificationsFailed,MessagesPublished)
      Total: ~35 alarms
    Value: '~35'
