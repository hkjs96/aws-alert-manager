AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS Monitoring Engine - EC2/RDS/ELB resource monitoring automation engine.
  Daily_Monitor (daily metric check) + Remediation_Handler (CloudTrail event-based auto remediation).
  Pure CloudFormation, no SAM. Upload zips to S3 then deploy via console.

Parameters:
  DeploymentBucket:
    Type: String
    Description: S3 bucket name where Lambda zip files are uploaded

  CodeVersion:
    Type: String
    Default: latest
    Description: S3 object key prefix (e.g. v20260306 or latest)

  DefaultCpuThreshold:
    Type: Number
    Default: 80
    Description: Default CPU utilization threshold (%)

  DefaultMemoryThreshold:
    Type: Number
    Default: 80
    Description: Default memory utilization threshold (%)

  DefaultConnectionsThreshold:
    Type: Number
    Default: 100
    Description: Default DB connection count threshold

  DefaultFreeMemoryGBThreshold:
    Type: Number
    Default: 2
    Description: Default free memory threshold in GB (alert when below this value)

  DefaultFreeStorageGBThreshold:
    Type: Number
    Default: 10
    Description: Default free storage threshold in GB (alert when below this value)

  DefaultDiskThreshold:
    Type: Number
    Default: 80
    Description: Default disk utilization threshold (%)

  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
    Description: Deployment environment (development / staging / production)

Mappings:
  LambdaConfig:
    Settings:
      Runtime: python3.12
      Timeout: 300
      MemorySize: 256
  # Full name → short abbreviation for resource naming
  EnvShortName:
    development:
      short: dev
    staging:
      short: stg
    production:
      short: prod

Resources:

  # ── Lambda Layer: common module ────────────
  CommonLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub
        - aws-monitoring-engine-common-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: AWS Monitoring Engine common modules (tag_resolver, sns_notifier, collectors)
      Content:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/common_layer.zip
      CompatibleRuntimes:
        - python3.12

  # ── Daily Monitor Lambda ───────────────────
  DailyMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub
        - aws-monitoring-engine-daily-monitor-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: EC2/RDS/ELB daily metric check and threshold alert
      Runtime: !FindInMap [LambdaConfig, Settings, Runtime]
      Timeout: !FindInMap [LambdaConfig, Settings, Timeout]
      MemorySize: !FindInMap [LambdaConfig, Settings, MemorySize]
      Handler: handler.handler
      Role: !GetAtt MonitoringEngineRole.Arn
      Layers:
        - !Ref CommonLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/daily_monitor.zip
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_ALERT: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_REMEDIATION: !Ref RemediationAlertTopic
          SNS_TOPIC_ARN_LIFECYCLE: !Ref LifecycleAlertTopic
          SNS_TOPIC_ARN_ERROR: !Ref ErrorAlertTopic
          DEFAULT_CPU_THRESHOLD: !Ref DefaultCpuThreshold
          DEFAULT_MEMORY_THRESHOLD: !Ref DefaultMemoryThreshold
          DEFAULT_CONNECTIONS_THRESHOLD: !Ref DefaultConnectionsThreshold
          DEFAULT_FREE_MEMORY_GB_THRESHOLD: !Ref DefaultFreeMemoryGBThreshold
          DEFAULT_FREE_STORAGE_GB_THRESHOLD: !Ref DefaultFreeStorageGBThreshold
          DEFAULT_DISK_THRESHOLD: !Ref DefaultDiskThreshold
          ENVIRONMENT: !FindInMap [EnvShortName, !Ref Environment, short]

  # ── Remediation Handler Lambda ─────────────
  RemediationHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub
        - aws-monitoring-engine-remediation-handler-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: CloudTrail event-based auto remediation and lifecycle alerts
      Runtime: !FindInMap [LambdaConfig, Settings, Runtime]
      Timeout: !FindInMap [LambdaConfig, Settings, Timeout]
      MemorySize: !FindInMap [LambdaConfig, Settings, MemorySize]
      Handler: handler.handler
      Role: !GetAtt RemediationHandlerRole.Arn
      Layers:
        - !Ref CommonLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/remediation_handler.zip
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_ALERT: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_REMEDIATION: !Ref RemediationAlertTopic
          SNS_TOPIC_ARN_LIFECYCLE: !Ref LifecycleAlertTopic
          SNS_TOPIC_ARN_ERROR: !Ref ErrorAlertTopic
          DEFAULT_CPU_THRESHOLD: !Ref DefaultCpuThreshold
          DEFAULT_MEMORY_THRESHOLD: !Ref DefaultMemoryThreshold
          DEFAULT_CONNECTIONS_THRESHOLD: !Ref DefaultConnectionsThreshold
          DEFAULT_FREE_MEMORY_GB_THRESHOLD: !Ref DefaultFreeMemoryGBThreshold
          DEFAULT_FREE_STORAGE_GB_THRESHOLD: !Ref DefaultFreeStorageGBThreshold
          DEFAULT_DISK_THRESHOLD: !Ref DefaultDiskThreshold
          ENVIRONMENT: !FindInMap [EnvShortName, !Ref Environment, short]

  # ── EventBridge Scheduler: Daily Monitor ──
  DailyMonitorSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub
        - daily-monitor-schedule-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: Run Daily Monitor every day at 09:00 KST (00:00 UTC)
      ScheduleExpression: "cron(0 0 * * ? *)"
      ScheduleExpressionTimezone: UTC
      State: ENABLED
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt DailyMonitorFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn

  # ── Lambda Permission: Scheduler → DailyMonitor ──
  DailyMonitorSchedulerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DailyMonitorFunction.Arn
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !GetAtt DailyMonitorSchedule.Arn

  # ── EventBridge Rule: CloudTrail events ───
  CloudTrailModifyRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub
        - cloudtrail-modify-events-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: Detect EC2/RDS/ELB modify, delete, and tag change events via CloudTrail
      State: ENABLED
      EventPattern:
        source:
          - aws.ec2
          - aws.rds
          - aws.elasticloadbalancing
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventName:
            - ModifyInstanceAttribute
            - ModifyInstanceType
            - ModifyDBInstance
            - ModifyLoadBalancerAttributes
            - ModifyListener
            - TerminateInstances
            - DeleteDBInstance
            - DeleteLoadBalancer
            - CreateTags
            - DeleteTags
      Targets:
        - Id: RemediationHandlerTarget
          Arn: !GetAtt RemediationHandlerFunction.Arn

  # ── Lambda Permission: EventBridge → RemediationHandler ──
  RemediationHandlerEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RemediationHandlerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CloudTrailModifyRule.Arn

  # ── SNS Topics ────────────────────────────
  MonitoringAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub
        - aws-monitoring-engine-alert-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      DisplayName: AWS Monitoring Engine - Threshold Alert

  RemediationAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub
        - aws-monitoring-engine-remediation-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      DisplayName: AWS Monitoring Engine - Auto-Remediation Complete

  LifecycleAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub
        - aws-monitoring-engine-lifecycle-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      DisplayName: AWS Monitoring Engine - Resource Lifecycle Alert

  ErrorAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub
        - aws-monitoring-engine-error-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      DisplayName: AWS Monitoring Engine - Error Alert

  # ── IAM Role: EventBridge Scheduler ───────
  SchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - aws-monitoring-engine-scheduler-role-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeDailyMonitor
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt DailyMonitorFunction.Arn

  # ── IAM Role: Daily Monitor ───────────────
  MonitoringEngineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - aws-monitoring-engine-daily-monitor-role-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DailyMonitorPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                Resource: "*"
              - Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                  - rds:ListTagsForResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                Resource: "*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref MonitoringAlertTopic
                  - !Ref ErrorAlertTopic

  # ── IAM Role: Remediation Handler ─────────
  RemediationHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - aws-monitoring-engine-remediation-role-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RemediationHandlerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeTags
                  - ec2:DescribeInstances
                  - ec2:StopInstances
                Resource: "*"
              - Effect: Allow
                Action:
                  - rds:ListTagsForResource
                  - rds:DescribeDBInstances
                  - rds:StopDBInstance
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DeleteLoadBalancer
                Resource: "*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref RemediationAlertTopic
                  - !Ref LifecycleAlertTopic
                  - !Ref ErrorAlertTopic

Outputs:
  DailyMonitorFunctionArn:
    Description: Daily Monitor Lambda ARN
    Value: !GetAtt DailyMonitorFunction.Arn

  RemediationHandlerFunctionArn:
    Description: Remediation Handler Lambda ARN
    Value: !GetAtt RemediationHandlerFunction.Arn

  MonitoringAlertTopicArn:
    Description: Threshold alert SNS topic ARN
    Value: !Ref MonitoringAlertTopic

  RemediationAlertTopicArn:
    Description: Auto-Remediation complete SNS topic ARN
    Value: !Ref RemediationAlertTopic

  LifecycleAlertTopicArn:
    Description: Resource lifecycle alert SNS topic ARN
    Value: !Ref LifecycleAlertTopic

  ErrorAlertTopicArn:
    Description: Error alert SNS topic ARN
    Value: !Ref ErrorAlertTopic
