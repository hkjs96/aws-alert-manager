AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS Monitoring Engine - EC2/RDS/ELB 리소스 모니터링 자동화 엔진
  Daily_Monitor(일일 메트릭 점검) + Remediation_Handler(CloudTrail 이벤트 기반 자동 조치)
  순수 CloudFormation (SAM 없음) - deploy.sh 로 S3 업로드 후 배포

# ──────────────────────────────────────────────
# 파라미터
# ──────────────────────────────────────────────
Parameters:
  DeploymentBucket:
    Type: String
    Description: Lambda 코드 zip 파일이 업로드된 S3 버킷 이름

  CodeVersion:
    Type: String
    Default: latest
    Description: S3 오브젝트 키 prefix (deploy.sh 가 생성하는 타임스탬프 또는 'latest')

  DefaultCpuThreshold:
    Type: Number
    Default: 80
    Description: CPU 사용률 기본 임계치 (%)

  DefaultMemoryThreshold:
    Type: Number
    Default: 80
    Description: Memory 사용률 기본 임계치 (%)

  DefaultConnectionsThreshold:
    Type: Number
    Default: 100
    Description: DB 연결 수 기본 임계치

  DefaultFreeMemoryGBThreshold:
    Type: Number
    Default: 2
    Description: 여유 메모리 기본 임계치 (GB, 이 값 미만이면 알림)

  DefaultFreeStorageGBThreshold:
    Type: Number
    Default: 10
    Description: 여유 스토리지 기본 임계치 (GB, 이 값 미만이면 알림)

  DefaultDiskThreshold:
    Type: Number
    Default: 85
    Description: 디스크 사용률 기본 임계치 (%)

  Environment:
    Type: String
    Default: prod
    AllowedValues: [dev, staging, prod]
    Description: 배포 환경

# ──────────────────────────────────────────────
# 공통 환경 변수 (Lambda 두 개가 공유)
# ──────────────────────────────────────────────
# CloudFormation Globals 는 SAM 전용이므로 각 Function 에 직접 기재합니다.
# 유지보수 편의를 위해 Mappings 로 분리합니다.
Mappings:
  LambdaConfig:
    Settings:
      Runtime: python3.12
      Timeout: 300
      MemorySize: 256

# ──────────────────────────────────────────────
# 리소스
# ──────────────────────────────────────────────
Resources:

  # ── Lambda Layer: common 모듈 ──────────────
  CommonLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub aws-monitoring-engine-common-${Environment}
      Description: AWS Monitoring Engine 공통 모듈 (tag_resolver, sns_notifier, collectors)
      Content:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/common_layer.zip
      CompatibleRuntimes:
        - python3.12

  # ── Daily Monitor Lambda ───────────────────
  DailyMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub aws-monitoring-engine-daily-monitor-${Environment}
      Description: EC2/RDS/ELB 메트릭 일일 점검 및 임계치 초과 알림
      Runtime: !FindInMap [LambdaConfig, Settings, Runtime]
      Timeout: !FindInMap [LambdaConfig, Settings, Timeout]
      MemorySize: !FindInMap [LambdaConfig, Settings, MemorySize]
      Handler: handler.handler
      Role: !GetAtt MonitoringEngineRole.Arn
      Layers:
        - !Ref CommonLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/daily_monitor.zip
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_ALERT: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_REMEDIATION: !Ref RemediationAlertTopic
          SNS_TOPIC_ARN_LIFECYCLE: !Ref LifecycleAlertTopic
          SNS_TOPIC_ARN_ERROR: !Ref ErrorAlertTopic
          DEFAULT_CPU_THRESHOLD: !Ref DefaultCpuThreshold
          DEFAULT_MEMORY_THRESHOLD: !Ref DefaultMemoryThreshold
          DEFAULT_CONNECTIONS_THRESHOLD: !Ref DefaultConnectionsThreshold
          DEFAULT_FREE_MEMORY_GB_THRESHOLD: !Ref DefaultFreeMemoryGBThreshold
          DEFAULT_FREE_STORAGE_GB_THRESHOLD: !Ref DefaultFreeStorageGBThreshold
          DEFAULT_DISK_THRESHOLD: !Ref DefaultDiskThreshold
          ENVIRONMENT: !Ref Environment

  # ── Remediation Handler Lambda ─────────────
  RemediationHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub aws-monitoring-engine-remediation-handler-${Environment}
      Description: CloudTrail 이벤트 기반 자동 조치 및 생명주기 알림
      Runtime: !FindInMap [LambdaConfig, Settings, Runtime]
      Timeout: !FindInMap [LambdaConfig, Settings, Timeout]
      MemorySize: !FindInMap [LambdaConfig, Settings, MemorySize]
      Handler: handler.handler
      Role: !GetAtt RemediationHandlerRole.Arn
      Layers:
        - !Ref CommonLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/remediation_handler.zip
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_ALERT: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_REMEDIATION: !Ref RemediationAlertTopic
          SNS_TOPIC_ARN_LIFECYCLE: !Ref LifecycleAlertTopic
          SNS_TOPIC_ARN_ERROR: !Ref ErrorAlertTopic
          DEFAULT_CPU_THRESHOLD: !Ref DefaultCpuThreshold
          DEFAULT_MEMORY_THRESHOLD: !Ref DefaultMemoryThreshold
          DEFAULT_CONNECTIONS_THRESHOLD: !Ref DefaultConnectionsThreshold
          DEFAULT_FREE_MEMORY_GB_THRESHOLD: !Ref DefaultFreeMemoryGBThreshold
          DEFAULT_FREE_STORAGE_GB_THRESHOLD: !Ref DefaultFreeStorageGBThreshold
          DEFAULT_DISK_THRESHOLD: !Ref DefaultDiskThreshold
          ENVIRONMENT: !Ref Environment

  # ── EventBridge Scheduler: Daily Monitor ──
  DailyMonitorSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub daily-monitor-schedule-${Environment}
      Description: 매일 오전 9시(KST) Daily Monitor 실행
      ScheduleExpression: "cron(0 0 * * ? *)"
      ScheduleExpressionTimezone: UTC
      State: ENABLED
      FlexibleTimeWindow:
        Mode: "OFF"
      Target:
        Arn: !GetAtt DailyMonitorFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn

  # ── Lambda Permission: Scheduler → DailyMonitor ──
  DailyMonitorSchedulerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt DailyMonitorFunction.Arn
      Action: lambda:InvokeFunction
      Principal: scheduler.amazonaws.com
      SourceArn: !GetAtt DailyMonitorSchedule.Arn

  # ── EventBridge Rule: CloudTrail 이벤트 ───
  CloudTrailModifyRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub cloudtrail-modify-events-${Environment}
      Description: EC2/RDS/ELB CloudTrail 변경/삭제/태그 이벤트 감지
      State: ENABLED
      EventPattern:
        source:
          - aws.ec2
          - aws.rds
          - aws.elasticloadbalancing
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventName:
            - ModifyInstanceAttribute
            - ModifyInstanceType
            - ModifyDBInstance
            - ModifyLoadBalancerAttributes
            - ModifyListener
            - TerminateInstances
            - DeleteDBInstance
            - DeleteLoadBalancer
            - CreateTags
            - DeleteTags
      Targets:
        - Id: RemediationHandlerTarget
          Arn: !GetAtt RemediationHandlerFunction.Arn

  # ── Lambda Permission: EventBridge → RemediationHandler ──
  RemediationHandlerEventPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt RemediationHandlerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CloudTrailModifyRule.Arn

  # ── SNS 토픽 ──────────────────────────────
  MonitoringAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub aws-monitoring-engine-alert-${Environment}
      DisplayName: AWS Monitoring Engine - 임계치 초과 알림

  RemediationAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub aws-monitoring-engine-remediation-${Environment}
      DisplayName: AWS Monitoring Engine - Auto-Remediation 완료 알림

  LifecycleAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub aws-monitoring-engine-lifecycle-${Environment}
      DisplayName: AWS Monitoring Engine - 리소스 생명주기 알림

  ErrorAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub aws-monitoring-engine-error-${Environment}
      DisplayName: AWS Monitoring Engine - 오류 알림

  # ── IAM 역할: EventBridge Scheduler ───────
  SchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub aws-monitoring-engine-scheduler-role-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: scheduler.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeDailyMonitor
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt DailyMonitorFunction.Arn

  # ── IAM 역할: Daily Monitor ────────────────
  MonitoringEngineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub aws-monitoring-engine-daily-monitor-role-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DailyMonitorPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                Resource: "*"
              - Effect: Allow
                Action:
                  - rds:DescribeDBInstances
                  - rds:ListTagsForResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                Resource: "*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref MonitoringAlertTopic
                  - !Ref ErrorAlertTopic

  # ── IAM 역할: Remediation Handler ─────────
  RemediationHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub aws-monitoring-engine-remediation-role-${Environment}
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: RemediationHandlerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeTags
                  - ec2:DescribeInstances
                  - ec2:StopInstances
                Resource: "*"
              - Effect: Allow
                Action:
                  - rds:ListTagsForResource
                  - rds:DescribeDBInstances
                  - rds:StopDBInstance
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DeleteLoadBalancer
                Resource: "*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref RemediationAlertTopic
                  - !Ref LifecycleAlertTopic
                  - !Ref ErrorAlertTopic

# ──────────────────────────────────────────────
# 출력
# ──────────────────────────────────────────────
Outputs:
  DailyMonitorFunctionArn:
    Description: Daily Monitor Lambda ARN
    Value: !GetAtt DailyMonitorFunction.Arn

  RemediationHandlerFunctionArn:
    Description: Remediation Handler Lambda ARN
    Value: !GetAtt RemediationHandlerFunction.Arn

  MonitoringAlertTopicArn:
    Description: 임계치 초과 알림 SNS 토픽 ARN
    Value: !Ref MonitoringAlertTopic

  RemediationAlertTopicArn:
    Description: Auto-Remediation 완료 알림 SNS 토픽 ARN
    Value: !Ref RemediationAlertTopic

  LifecycleAlertTopicArn:
    Description: 리소스 생명주기 알림 SNS 토픽 ARN
    Value: !Ref LifecycleAlertTopic

  ErrorAlertTopicArn:
    Description: 오류 알림 SNS 토픽 ARN
    Value: !Ref ErrorAlertTopic
