AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Alarm Manager - customer account onboarding stack.
  Creates a single IAM Role that lets the central (monitoring) account use STS
  AssumeRole to read this account's resources and manage CloudWatch alarms
  (tag-based). No heavy resources (Lambda/DB) are created in the customer
  account - lightweight onboarding.

Parameters:
  CentralAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: Central (monitoring) account ID. Only this account may AssumeRole the role below.

  RoleName:
    Type: String
    Default: AlarmManagerMonitoringRole
    Description: Name of the IAM Role to create. After creation, use the RoleArn output to register this account in the app.

Resources:
  MonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      # Trust policy: the central account can AssumeRole.
      # Note: the central handler does not pass an ExternalId, so it is not
      # required here. (Enforcing ExternalId would require changing the central
      # assume_role call first.)
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${CentralAccountId}:root"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AlarmManagerMonitoringAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # 1) CloudWatch alarm CRUD + metrics + tags
              - Effect: Allow
                Action:
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:ListTagsForResource
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:TagResource
                  - cloudwatch:ListMetrics
                Resource: "*"
              # 2) Resource discovery (read) - describe/list + tag reads for the 29 supported services
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                  - ec2:DescribeNatGateways
                  - ec2:DescribeVpnConnections
                  - rds:DescribeDBInstances
                  - rds:ListTagsForResource
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTags
                  - lambda:ListFunctions
                  - lambda:ListTags
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                  - s3:GetBucketTagging
                  - elasticache:DescribeCacheClusters
                  - elasticache:ListTagsForResource
                  - sqs:ListQueues
                  - sqs:ListQueueTags
                  - dynamodb:ListTables
                  - dynamodb:DescribeTable
                  - dynamodb:ListTagsOfResource
                  - elasticfilesystem:DescribeFileSystems
                  - ecs:ListClusters
                  - ecs:ListServices
                  - ecs:DescribeServices
                  - ecs:ListTagsForResource
                  - es:ListDomainNames
                  - es:DescribeDomains
                  - es:ListTags
                  - apigateway:GET
                  - acm:ListCertificates
                  - acm:DescribeCertificate
                  - backup:ListBackupVaults
                  - backup:ListTags
                  - mq:ListBrokers
                  - mq:DescribeBroker
                  - kafka:ListClustersV2
                  - wafv2:ListWebACLs
                  - wafv2:ListTagsForResource
                  - directconnect:DescribeConnections
                  - directconnect:DescribeTags
                  - sagemaker:ListEndpoints
                  - sagemaker:ListTags
                  - sns:ListTopics
                  - sns:ListTagsForResource
                  - cloudfront:ListDistributions
                  - cloudfront:ListTagsForResource
                  - route53:ListHealthChecks
                  - route53:ListTagsForResource
                Resource: "*"
              # 3) Monitoring toggle (tag write) - per-service tag-write permissions that the
              #    Resource Groups Tagging API delegates. (Governance AP-19: a missing one makes
              #    the toggle permanently AccessDenied.)
              - Effect: Allow
                Action:
                  - tag:TagResources
                  - ec2:CreateTags
                  - rds:AddTagsToResource
                  - elasticache:AddTagsToResource
                  - lambda:TagResource
                  - s3:PutBucketTagging
                  - elasticloadbalancing:AddTags
                  - sqs:TagQueue
                  - dynamodb:TagResource
                  - elasticfilesystem:TagResource
                  - es:AddTags
                  - ecs:TagResource
                  - acm:AddTagsToCertificate
                  - backup:TagResource
                  - mq:CreateTags
                  - kafka:TagResource
                  - wafv2:TagResource
                  - directconnect:TagResource
                  - sagemaker:AddTags
                  - sns:TagResource
                  - cloudfront:TagResource
                  - route53:ChangeTagsForResource
                Resource: "*"
      Tags:
        - Key: ManagedBy
          Value: AlarmManager

Outputs:
  RoleArn:
    Description: Role ARN to use when registering this account (account_id, role_arn) in the app.
    Value: !GetAtt MonitoringRole.Arn
