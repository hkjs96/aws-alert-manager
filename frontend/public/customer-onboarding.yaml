AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Alarm Manager - 고객사 계정 온보딩 스택.
  중앙(모니터링) 계정이 STS AssumeRole로 이 계정의 리소스를 조회하고
  CloudWatch 알람을 관리(태그 기반)할 수 있도록 하는 IAM Role 하나를 생성한다.
  고객사 계정에는 이 Role 외에 Lambda/DB 등 무거운 리소스를 두지 않는다(경량 온보딩).

Parameters:
  CentralAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: 중앙(모니터링) 계정 ID. 이 계정만 아래 Role을 AssumeRole 할 수 있다.

  RoleName:
    Type: String
    Default: AlarmManagerMonitoringRole
    Description: 생성할 Role 이름. 생성 후 Output의 RoleArn을 앱의 계정 등록에 사용한다.

Resources:
  MonitoringRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      # 신뢰 정책: 중앙 계정이 AssumeRole 가능.
      # 참고: 현재 중앙 핸들러는 ExternalId를 전달하지 않으므로 여기서도 요구하지 않는다.
      # (ExternalId 강제는 중앙 코드의 assume_role 호출 변경이 선행되어야 한다.)
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${CentralAccountId}:root"
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AlarmManagerMonitoringAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # 1) CloudWatch 알람 CRUD + 메트릭 + 태그
              - Effect: Allow
                Action:
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:ListTagsForResource
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:TagResource
                  - cloudwatch:ListMetrics
                Resource: "*"
              # 2) 리소스 디스커버리(read) — 29종 지원 서비스의 describe/list + 태그 조회
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                  - ec2:DescribeNatGateways
                  - ec2:DescribeVpnConnections
                  - rds:DescribeDBInstances
                  - rds:ListTagsForResource
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeTags
                  - lambda:ListFunctions
                  - lambda:ListTags
                  - s3:ListAllMyBuckets
                  - s3:GetBucketLocation
                  - s3:GetBucketTagging
                  - elasticache:DescribeCacheClusters
                  - elasticache:ListTagsForResource
                  - sqs:ListQueues
                  - sqs:ListQueueTags
                  - dynamodb:ListTables
                  - dynamodb:DescribeTable
                  - dynamodb:ListTagsOfResource
                  - elasticfilesystem:DescribeFileSystems
                  - ecs:ListClusters
                  - ecs:ListServices
                  - ecs:DescribeServices
                  - ecs:ListTagsForResource
                  - es:ListDomainNames
                  - es:DescribeDomains
                  - es:ListTags
                  - apigateway:GET
                  - acm:ListCertificates
                  - acm:DescribeCertificate
                  - backup:ListBackupVaults
                  - backup:ListTags
                  - mq:ListBrokers
                  - mq:DescribeBroker
                  - kafka:ListClustersV2
                  - wafv2:ListWebACLs
                  - wafv2:ListTagsForResource
                  - directconnect:DescribeConnections
                  - directconnect:DescribeTags
                  - sagemaker:ListEndpoints
                  - sagemaker:ListTags
                  - sns:ListTopics
                  - sns:ListTagsForResource
                  - cloudfront:ListDistributions
                  - cloudfront:ListTagsForResource
                  - route53:ListHealthChecks
                  - route53:ListTagsForResource
                Resource: "*"
              # 3) 모니터링 토글(태그 write) — Resource Groups Tagging API가 위임 호출하는
              #    서비스별 태그 쓰기 권한. (거버넌스 AP-19: 빠지면 토글이 영구 AccessDenied)
              - Effect: Allow
                Action:
                  - tag:TagResources
                  - ec2:CreateTags
                  - rds:AddTagsToResource
                  - elasticache:AddTagsToResource
                  - lambda:TagResource
                  - s3:PutBucketTagging
                  - elasticloadbalancing:AddTags
                  - sqs:TagQueue
                  - dynamodb:TagResource
                  - elasticfilesystem:TagResource
                  - es:AddTags
                  - ecs:TagResource
                  - acm:AddTagsToCertificate
                  - backup:TagResource
                  - mq:CreateTags
                  - kafka:TagResource
                  - wafv2:TagResource
                  - directconnect:TagResource
                  - sagemaker:AddTags
                  - sns:TagResource
                  - cloudfront:TagResource
                  - route53:ChangeTagsForResource
                Resource: "*"
      Tags:
        - Key: ManagedBy
          Value: AlarmManager

Outputs:
  RoleArn:
    Description: 앱의 계정 등록(account_id, role_arn)에 사용할 Role ARN
    Value: !GetAtt MonitoringRole.Arn
