AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  E2E Database Resources Test Infra.
  RDS MySQL + Aurora Provisioned (Writer + Reader) + Aurora Serverless v2 + DocDB + ElastiCache Redis.
  All resources tagged Monitoring=on for alarm auto-creation.

Parameters:
  Environment:
    Type: String
    Default: dev
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId1:
    Type: AWS::EC2::Subnet::Id
  SubnetId2:
    Type: AWS::EC2::Subnet::Id
  DBMasterPassword:
    Type: String
    NoEcho: true
    MinLength: 8

Resources:
  # ============================================================
  # Shared Security Group for Databases
  # ============================================================
  DbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-db-sg'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/8
        - IpProtocol: tcp
          FromPort: 27017
          ToPort: 27017
          CidrIp: 10.0.0.0/8
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 10.0.0.0/8

  # ============================================================
  # Shared Subnet Groups
  # ============================================================
  RdsSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${Environment}-e2e-rds-subnet-group'
      SubnetIds:
        - !Ref SubnetId1
        - !Ref SubnetId2

  DocDBSubnetGroup:
    Type: AWS::DocDB::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub '${Environment}-e2e-docdb-subnet-group'
      SubnetIds:
        - !Ref SubnetId1
        - !Ref SubnetId2

  ElastiCacheSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub '${Environment}-e2e-redis-subnet-group'
      Description: !Sub '${Environment}-e2e-redis-subnet-group'
      SubnetIds:
        - !Ref SubnetId1
        - !Ref SubnetId2

  # ============================================================
  # 1. RDS MySQL (non-Aurora)
  # ============================================================
  RDSInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub '${Environment}-e2e-rds'
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: '8.0'
      MasterUsername: admin
      MasterUserPassword: !Ref DBMasterPassword
      AllocatedStorage: 20
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VPCSecurityGroups:
        - !Ref DbSg
      PubliclyAccessible: false
      DeletionProtection: false
      BackupRetentionPeriod: 0
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-rds'

  # ============================================================
  # 2. Aurora Provisioned (Writer + Reader)
  # ============================================================
  AuroraProvCluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Delete
    Properties:
      DBClusterIdentifier: !Sub '${Environment}-e2e-aurora-prov'
      Engine: aurora-mysql
      EngineVersion: '8.0.mysql_aurora.3.08.0'
      MasterUsername: admin
      MasterUserPassword: !Ref DBMasterPassword
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DbSg
      BackupRetentionPeriod: 1
      DeletionProtection: false
      StorageEncrypted: true
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-aurora-prov'

  AuroraProvWriter:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${Environment}-e2e-aurora-writer'
      DBClusterIdentifier: !Ref AuroraProvCluster
      DBInstanceClass: db.t3.medium
      Engine: aurora-mysql
      PubliclyAccessible: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-aurora-writer'
        - Key: Threshold_CPU
          Value: '90'

  AuroraProvReader:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${Environment}-e2e-aurora-reader'
      DBClusterIdentifier: !Ref AuroraProvCluster
      DBInstanceClass: db.t3.medium
      Engine: aurora-mysql
      PubliclyAccessible: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-aurora-reader'

  # ============================================================
  # 3. Aurora Serverless v2
  # ============================================================
  AuroraSv2Cluster:
    Type: AWS::RDS::DBCluster
    DeletionPolicy: Delete
    Properties:
      DBClusterIdentifier: !Sub '${Environment}-e2e-aurora-sv2'
      Engine: aurora-mysql
      EngineVersion: '8.0.mysql_aurora.3.08.0'
      MasterUsername: admin
      MasterUserPassword: !Ref DBMasterPassword
      DBSubnetGroupName: !Ref RdsSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DbSg
      ServerlessV2ScalingConfiguration:
        MinCapacity: 0.5
        MaxCapacity: 1
      BackupRetentionPeriod: 1
      DeletionProtection: false
      StorageEncrypted: true
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-aurora-sv2'

  AuroraSv2Writer:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${Environment}-e2e-aurora-sv2-writer'
      DBClusterIdentifier: !Ref AuroraSv2Cluster
      DBInstanceClass: db.serverless
      Engine: aurora-mysql
      PubliclyAccessible: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-aurora-sv2-writer'

  # ============================================================
  # 4. DocumentDB
  # ============================================================
  DocDBCluster:
    Type: AWS::DocDB::DBCluster
    Properties:
      DBClusterIdentifier: !Sub '${Environment}-e2e-docdb'
      MasterUsername: docdbadmin
      MasterUserPassword: !Ref DBMasterPassword
      DBSubnetGroupName: !Ref DocDBSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DbSg
      DeletionProtection: false
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-docdb'

  DocDBInstance:
    Type: AWS::DocDB::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub '${Environment}-e2e-docdb-inst'
      DBClusterIdentifier: !Ref DocDBCluster
      DBInstanceClass: db.t3.medium
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-docdb-inst'

  # ============================================================
  # 5. ElastiCache Redis
  # ============================================================
  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: !Sub '${Environment}-e2e-redis'
      Engine: redis
      CacheNodeType: cache.t3.micro
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref ElastiCacheSubnetGroup
      VpcSecurityGroupIds:
        - !Ref DbSg
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-redis'
        - Key: Threshold_CurrConnections
          Value: '300'
        - Key: Threshold_StringGetLatency
          Value: '0.005'

Outputs:
  RDSInstanceId:
    Value: !Ref RDSInstance
  AuroraProvWriterId:
    Value: !Ref AuroraProvWriter
  AuroraProvReaderId:
    Value: !Ref AuroraProvReader
  AuroraSv2WriterId:
    Value: !Ref AuroraSv2Writer
  DocDBInstanceId:
    Value: !Ref DocDBInstance
  RedisClusterId:
    Value: !Ref RedisCluster
