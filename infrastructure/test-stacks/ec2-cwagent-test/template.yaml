AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  EC2 CWAgent Test Infra.
  5x t3.nano (cheapest x86) with CloudWatch Agent installed via UserData.
  Instance 4-5 have an extra 10 GB gp3 EBS disk mounted at /data.
  All tagged Monitoring=on for alarm auto-creation validation.
  Delete stack after testing to save cost.

Parameters:
  Environment:
    Type: String
    Default: dev
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId:
    Type: AWS::EC2::Subnet::Id
    Description: Subnet (private is fine — SSM access only, no key pair needed)
  AmiId:
    Type: AWS::EC2::Image::Id
    Description: Amazon Linux 2023 AMI ID (e.g. ami-0c02fb55956c7d316 in us-east-1)

# ─────────────────────────────────────────────────────────────────────────────
# UserData snippets shared via Mappings (to avoid repetition)
# ─────────────────────────────────────────────────────────────────────────────
# Note: UserData is inlined per-instance because the disk config differs.

Resources:

  # ═══════════════════════════════════════════════════════════════════════════
  # IAM — EC2 Role (SSM + CW Agent)
  # ═══════════════════════════════════════════════════════════════════════════
  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-ec2-cwagent-test-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub '${Environment}-ec2-cwagent-test-profile'
      Roles:
        - !Ref Ec2Role

  # ═══════════════════════════════════════════════════════════════════════════
  # Security Group — egress only (SSM, no inbound needed)
  # ═══════════════════════════════════════════════════════════════════════════
  Ec2Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-ec2-cwagent-test-sg'
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-ec2-cwagent-test-sg'

  # ═══════════════════════════════════════════════════════════════════════════
  # EC2 × 3 — root disk only, CWAgent monitors / only
  # ═══════════════════════════════════════════════════════════════════════════
  Ec2Basic1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          AssociatePublicIpAddress: false
          GroupSet:
            - !Ref Ec2Sg
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y amazon-cloudwatch-agent
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWCFG'
          {
            "metrics": {
              "namespace": "CWAgent",
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"],
                  "metrics_collection_interval": 60
                },
                "disk": {
                  "measurement": ["disk_used_percent"],
                  "metrics_collection_interval": 60,
                  "resources": ["/"]
                }
              },
              "append_dimensions": { "InstanceId": "${!aws:InstanceId}" }
            }
          }
          CWCFG
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-ec2-cwagent-basic-1'

  Ec2Basic2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          AssociatePublicIpAddress: false
          GroupSet:
            - !Ref Ec2Sg
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y amazon-cloudwatch-agent
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWCFG'
          {
            "metrics": {
              "namespace": "CWAgent",
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"],
                  "metrics_collection_interval": 60
                },
                "disk": {
                  "measurement": ["disk_used_percent"],
                  "metrics_collection_interval": 60,
                  "resources": ["/"]
                }
              },
              "append_dimensions": { "InstanceId": "${!aws:InstanceId}" }
            }
          }
          CWCFG
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-ec2-cwagent-basic-2'

  Ec2Basic3:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          AssociatePublicIpAddress: false
          GroupSet:
            - !Ref Ec2Sg
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y amazon-cloudwatch-agent
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWCFG'
          {
            "metrics": {
              "namespace": "CWAgent",
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"],
                  "metrics_collection_interval": 60
                },
                "disk": {
                  "measurement": ["disk_used_percent"],
                  "metrics_collection_interval": 60,
                  "resources": ["/"]
                }
              },
              "append_dimensions": { "InstanceId": "${!aws:InstanceId}" }
            }
          }
          CWCFG
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-ec2-cwagent-basic-3'

  # ═══════════════════════════════════════════════════════════════════════════
  # EC2 × 2 — root + extra 10 GB gp3 disk, CWAgent monitors / and /data
  # ═══════════════════════════════════════════════════════════════════════════
  Ec2MultiDisk1:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvdb      # Nitro → appears as /dev/nvme1n1
          Ebs:
            VolumeSize: 10
            VolumeType: gp3
            DeleteOnTermination: true
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          AssociatePublicIpAddress: false
          GroupSet:
            - !Ref Ec2Sg
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y amazon-cloudwatch-agent

          # ── 추가 디스크 탐색·포맷·마운트 ──────────────────────────────────
          # t3 (Nitro) 에서 /dev/xvdb는 /dev/nvme1n1 로 노출됨.
          # lsblk로 마운트되지 않은 디스크를 동적으로 찾아 처리.
          EXTRA=$(lsblk -o NAME,TYPE,MOUNTPOINTS -n -l \
                  | awk '$2=="disk" && $3=="" {print "/dev/"$1}' \
                  | grep -v nvme0 | head -1)
          if [ -n "$EXTRA" ]; then
            mkfs.ext4 -F "$EXTRA"
            mkdir -p /data
            mount "$EXTRA" /data
            UUID=$(blkid -s UUID -o value "$EXTRA")
            echo "UUID=$UUID /data ext4 defaults,nofail 0 2" >> /etc/fstab
          fi

          # ── CWAgent 설정 (/ + /data) ──────────────────────────────────────
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWCFG'
          {
            "metrics": {
              "namespace": "CWAgent",
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"],
                  "metrics_collection_interval": 60
                },
                "disk": {
                  "measurement": ["disk_used_percent"],
                  "metrics_collection_interval": 60,
                  "resources": ["/", "/data"]
                }
              },
              "append_dimensions": { "InstanceId": "${!aws:InstanceId}" }
            }
          }
          CWCFG
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-ec2-cwagent-multidisk-1'

  Ec2MultiDisk2:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.nano
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      BlockDeviceMappings:
        - DeviceName: /dev/xvdb
          Ebs:
            VolumeSize: 10
            VolumeType: gp3
            DeleteOnTermination: true
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId
          AssociatePublicIpAddress: false
          GroupSet:
            - !Ref Ec2Sg
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y amazon-cloudwatch-agent

          # ── 추가 디스크 탐색·포맷·마운트 ──────────────────────────────────
          EXTRA=$(lsblk -o NAME,TYPE,MOUNTPOINTS -n -l \
                  | awk '$2=="disk" && $3=="" {print "/dev/"$1}' \
                  | grep -v nvme0 | head -1)
          if [ -n "$EXTRA" ]; then
            mkfs.ext4 -F "$EXTRA"
            mkdir -p /data
            mount "$EXTRA" /data
            UUID=$(blkid -s UUID -o value "$EXTRA")
            echo "UUID=$UUID /data ext4 defaults,nofail 0 2" >> /etc/fstab
          fi

          # ── CWAgent 설정 (/ + /data) ──────────────────────────────────────
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWCFG'
          {
            "metrics": {
              "namespace": "CWAgent",
              "metrics_collected": {
                "mem": {
                  "measurement": ["mem_used_percent"],
                  "metrics_collection_interval": 60
                },
                "disk": {
                  "measurement": ["disk_used_percent"],
                  "metrics_collection_interval": 60,
                  "resources": ["/", "/data"]
                }
              },
              "append_dimensions": { "InstanceId": "${!aws:InstanceId}" }
            }
          }
          CWCFG
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl \
            -a fetch-config -m ec2 \
            -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-ec2-cwagent-multidisk-2'

# ─────────────────────────────────────────────────────────────────────────────
Outputs:
  Basic1Id:   { Value: !Ref Ec2Basic1 }
  Basic2Id:   { Value: !Ref Ec2Basic2 }
  Basic3Id:   { Value: !Ref Ec2Basic3 }
  MultiDisk1Id: { Value: !Ref Ec2MultiDisk1 }
  MultiDisk2Id: { Value: !Ref Ec2MultiDisk2 }
