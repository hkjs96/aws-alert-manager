AWSTemplateFormatVersion: '2010-09-09'
Description: >-
  E2E Web and Load Balancer Resources Test Infra.
  EC2 Instance (Target + Bastion) + ALB + NLB + Target Groups + NAT Gateway
  + ElastiCache (Redis). All resources tagged Monitoring=on for alarm auto-creation.

Parameters:
  Environment:
    Type: String
    Default: dev
  VpcId:
    Type: AWS::EC2::VPC::Id
  SubnetId1:
    Type: AWS::EC2::Subnet::Id
  SubnetId2:
    Type: AWS::EC2::Subnet::Id
  AmiId:
    Type: AWS::EC2::Image::Id

Resources:
  # ============================================================
  # Shared Security Groups for Load Balancer and Compute
  # ============================================================
  LbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-lb-sg'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0

  Ec2Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-ec2-sg'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 0.0.0.0/0
      SecurityGroupEgress:
        - IpProtocol: '-1'
          CidrIp: 0.0.0.0/0

  # ============================================================
  # IAM Role for EC2 (SSM + CW Agent)
  # ============================================================
  Ec2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub '${Environment}-e2e-web-ec2-role'
      AssumeRolePolicyDocument:
        Version: '2012-10-17'
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/CloudWatchAgentServerPolicy
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  Ec2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      Roles:
        - !Ref Ec2Role

  # ============================================================
  # EC2 Instances (target + bastion)
  # ============================================================
  Ec2Target:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId1
          AssociatePublicIpAddress: true
          GroupSet:
            - !Ref Ec2Sg
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y httpd
          INSTANCE_ID=$(ec2-metadata -i | awk '{print $2}')
          cat > /var/www/html/index.html <<EOF
          {"instance":"$INSTANCE_ID","status":"ok"}
          EOF
          mkdir -p /var/www/html/ip
          cp /var/www/html/index.html /var/www/html/ip/index.html
          systemctl enable httpd && systemctl start httpd
          dnf install -y amazon-cloudwatch-agent
          cat > /opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json <<'CWCFG'
          {
            "metrics": {
              "namespace": "CWAgent",
              "metrics_collected": {
                "mem": { "measurement": ["mem_used_percent"], "metrics_collection_interval": 60 },
                "disk": { "measurement": ["disk_used_percent"], "metrics_collection_interval": 60, "resources": ["/"] }
              },
              "append_dimensions": { "InstanceId": "${!aws:InstanceId}" }
            }
          }
          CWCFG
          /opt/aws/amazon-cloudwatch-agent/bin/amazon-cloudwatch-agent-ctl -a fetch-config -m ec2 -c file:/opt/aws/amazon-cloudwatch-agent/etc/amazon-cloudwatch-agent.json -s
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-ec2-target'

  Ec2Bastion:
    Type: AWS::EC2::Instance
    Properties:
      InstanceType: t3.micro
      ImageId: !Ref AmiId
      IamInstanceProfile: !Ref Ec2InstanceProfile
      NetworkInterfaces:
        - DeviceIndex: '0'
          SubnetId: !Ref SubnetId1
          AssociatePublicIpAddress: true
          GroupSet:
            - !Ref Ec2Sg
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash -xe
          dnf install -y httpd
          INSTANCE_ID=$(ec2-metadata -i | awk '{print $2}')
          cat > /var/www/html/index.html <<EOF
          {"instance":"$INSTANCE_ID","status":"ok","role":"bastion"}
          EOF
          mkdir -p /var/www/html/ip
          cp /var/www/html/index.html /var/www/html/ip/index.html
          systemctl enable httpd && systemctl start httpd
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-ec2-bastion'

  # ============================================================
  # ALB + Target Groups + Listener
  # ============================================================
  TestAlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${Environment}-e2e-alb'
      Type: application
      Scheme: internet-facing
      Subnets:
        - !Ref SubnetId1
        - !Ref SubnetId2
      SecurityGroups:
        - !Ref LbSg
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-alb'

  AlbTgInstance:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${Environment}-e2e-alb-tg-inst'
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VpcId
      TargetType: instance
      Targets:
        - Id: !Ref Ec2Target
          Port: 80
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-alb-tg-inst'

  AlbTgIp:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${Environment}-e2e-alb-tg-ip'
      Protocol: HTTP
      Port: 80
      VpcId: !Ref VpcId
      TargetType: ip
      Targets:
        - Id: !GetAtt Ec2Bastion.PrivateIp
          Port: 80
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-alb-tg-ip'

  AlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref TestAlb
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AlbTgInstance

  AlbListenerRuleIp:
    Type: AWS::ElasticLoadBalancingV2::ListenerRule
    Properties:
      ListenerArn: !Ref AlbListener
      Priority: 10
      Conditions:
        - Field: path-pattern
          Values: ['/ip/*']
      Actions:
        - Type: forward
          TargetGroupArn: !Ref AlbTgIp

  # ============================================================
  # NLB + Target Group + Listener
  # ============================================================
  TestNlb:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub '${Environment}-e2e-nlb'
      Type: network
      Scheme: internet-facing
      Subnets:
        - !Ref SubnetId1
        - !Ref SubnetId2
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-nlb'

  NlbTg:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub '${Environment}-e2e-nlb-tg'
      Protocol: TCP
      Port: 80
      VpcId: !Ref VpcId
      TargetType: ip
      Targets:
        - Id: !GetAtt Ec2Target.PrivateIp
          Port: 80
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-nlb-tg'

  NlbListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref TestNlb
      Port: 80
      Protocol: TCP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref NlbTg

  # ============================================================
  # NAT Gateway (requires EIP)
  # ============================================================
  NatEip:
    Type: AWS::EC2::EIP
    Properties:
      Domain: vpc
      Tags:
        - Key: Name
          Value: !Sub '${Environment}-e2e-nat-eip'

  NatGateway:
    Type: AWS::EC2::NatGateway
    Properties:
      AllocationId: !GetAtt NatEip.AllocationId
      SubnetId: !Ref SubnetId1
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-natgw'
        - Key: Threshold_PacketsDropCount
          Value: '5'

  # ============================================================
  # ElastiCache (Redis) - verified together with the LB test stack
  # ============================================================
  RedisSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub '${Environment}-e2e-web-redis-sg'
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 0.0.0.0/0

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub '${Environment}-e2e-web-redis-subnets'
      Description: Redis test subnet group (web stack)
      SubnetIds:
        - !Ref SubnetId1
        - !Ref SubnetId2

  RedisCluster:
    Type: AWS::ElastiCache::CacheCluster
    Properties:
      ClusterName: !Sub '${Environment}-e2e-web-redis'
      Engine: redis
      CacheNodeType: cache.t3.micro
      NumCacheNodes: 1
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      VpcSecurityGroupIds:
        - !Ref RedisSg
      Tags:
        - Key: Monitoring
          Value: 'on'
        - Key: Name
          Value: !Sub '${Environment}-e2e-web-redis'
        - Key: Threshold_CurrConnections
          Value: '300'
        - Key: Threshold_StringGetLatency
          Value: '0.005'

Outputs:
  Ec2TargetId:
    Value: !Ref Ec2Target
  Ec2BastionId:
    Value: !Ref Ec2Bastion
  AlbDnsName:
    Value: !GetAtt TestAlb.DNSName
  NlbDnsName:
    Value: !GetAtt TestNlb.DNSName
  AlbArn:
    Value: !Ref TestAlb
  NlbArn:
    Value: !Ref TestNlb
  AlbTgInstanceArn:
    Value: !Ref AlbTgInstance
  AlbTgIpArn:
    Value: !Ref AlbTgIp
  NlbTgArn:
    Value: !Ref NlbTg
  NatGatewayId:
    Value: !Ref NatGateway
