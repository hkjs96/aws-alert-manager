                  - !GetAtt AccountsTable.Arn
                  - !Sub "${AccountsTable.Arn}/index/*"
              # -- DynamoDB: ResourceInventoryTable upsert (Daily Monitor inventory sync) --
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:DeleteItem
                Resource:
                  - !GetAtt ResourceInventoryTable.Arn
