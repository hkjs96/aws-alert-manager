    Description: DynamoDB Customers table name
    Value: !Ref CustomersTable

  AccountsTableName:
    Description: DynamoDB Accounts table name
    Value: !Ref AccountsTable

  DailyMonitorFunctionArn:
    Description: Daily Monitor Lambda ARN
    Value: !GetAtt DailyMonitorFunction.Arn

  RemediationHandlerFunctionArn:
    Description: Remediation Handler Lambda ARN
    Value: !GetAtt RemediationHandlerFunction.Arn

  MonitoringAlertTopicArn:
    Description: Threshold alert SNS topic ARN
    Value: !Ref MonitoringAlertTopic

  RemediationAlertTopicArn:
    Description: Auto-Remediation complete SNS topic ARN
    Value: !Ref RemediationAlertTopic

  LifecycleAlertTopicArn:
    Description: Resource lifecycle alert SNS topic ARN
    Value: !Ref LifecycleAlertTopic

  ErrorAlertTopicArn:
    Description: Error alert SNS topic ARN
    Value: !Ref ErrorAlertTopic

  BulkOperationQueueUrl:
    Description: SQS FIFO queue URL for bulk alarm operations
    Value: !Ref BulkOperationQueue

  JobStatusTableName:
    Description: DynamoDB Job Status table name
    Value: !Ref JobStatusTable

  MonitorRunHistoryTableName:
    Description: DynamoDB Daily Monitor run history table name
    Value: !Ref MonitorRunHistoryTable

  GlobalAlertTopicArn:
    Description: us-east-1 SNS topic ARN for global service alarms (CloudFront/Route53)
    Value: !GetAtt GlobalAlertSetup.TopicArn
