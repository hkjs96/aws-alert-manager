        source:
          - aws.ec2
          - aws.rds
          - aws.elasticloadbalancing
          - aws.elasticache
          - aws.lambda
          - aws.apigateway
          - aws.acm
          - aws.backup
          - aws.amazonmq
          - aws.es
          # -- Extended Resource Monitoring (12 new sources) ---
          - aws.sqs
          - aws.ecs
          - aws.kafka
          - aws.dynamodb
          - aws.cloudfront
          - aws.wafv2
          - aws.route53
          - aws.directconnect
          - aws.elasticfilesystem
          - aws.s3
          - aws.sagemaker
          - aws.sns
        detail-type:
          - AWS API Call via CloudTrail
        detail:
          eventName:
            - ModifyInstanceAttribute
            - ModifyInstanceType
            - ModifyDBInstance
            - ModifyLoadBalancerAttributes
            - ModifyListener
            - TerminateInstances
            - DeleteDBInstance
            - DeleteLoadBalancer
            - DeleteTargetGroup
            - CreateTags
            - DeleteTags
            - AddTagsToResource
            - RemoveTagsFromResource
            - AddTags
            - RemoveTags
            - RunInstances
            - CreateDBInstance
            - CreateLoadBalancer
            - CreateTargetGroup
            - CreateCacheCluster
            - DeleteCacheCluster
            - ModifyCacheCluster
            - CreateNatGateway
            - DeleteNatGateway
            # -- ---
            - CreateFunction20150331
            - DeleteFunction20150331
            - DeleteVpnConnection
            - CreateRestApi
            - DeleteRestApi
            - CreateApi
            - DeleteApi
            - DeleteCertificate
            - CreateBackupVault
            - DeleteBackupVault
            - CreateBroker
            - DeleteBroker
            - CreateDomain
            - DeleteDomain
            - TagResource
            - UntagResource
            # -- Extended Resource Monitoring (new events) ---
            - CreateQueue
            - DeleteQueue
            - TagQueue
            - UntagQueue
            - CreateService
            - DeleteService
            - CreateCluster
            - DeleteCluster
            - CreateTable
            - DeleteTable
            - CreateDistribution
            - DeleteDistribution
            - CreateWebACL
            - DeleteWebACL
            - CreateHealthCheck
            - DeleteHealthCheck
            - CreateConnection
            - DeleteConnection
            - CreateFileSystem
            - DeleteFileSystem
            - CreateBucket
