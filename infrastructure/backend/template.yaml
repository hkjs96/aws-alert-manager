  # -- IAM Role: Global Alert Setup Lambda --
  GlobalAlertSetupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - aws-monitoring-engine-global-alert-setup-role-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
