AWSTemplateFormatVersion: "2010-09-09"
Description: >
  AWS Monitoring Engine - EC2/RDS/ELB resource monitoring automation engine.
  Daily_Monitor (daily metric check) + Remediation_Handler (CloudTrail event-based auto remediation).
  Pure CloudFormation, no SAM. Upload zips to S3 then deploy via console.

Parameters:
  DeploymentBucket:
    Type: String
    MinLength: 3
    MaxLength: 63
    Description: S3 bucket name where Lambda zip files are uploaded

  CodeVersion:
    Type: String
    Default: latest
    MinLength: 1
    Description: S3 object key prefix (e.g. v20260306 or latest)

  DefaultCpuThreshold:
    Type: Number
    Default: 80
    Description: Default CPU utilization threshold (%)

  DefaultMemoryThreshold:
    Type: Number
    Default: 80
    Description: Default memory utilization threshold (%)

  DefaultConnectionsThreshold:
    Type: Number
    Default: 100
    Description: Default DB connection count threshold

  DefaultFreeMemoryGBThreshold:
    Type: Number
    Default: 2
    Description: Default free memory threshold in GB (alert when below this value)

  DefaultFreeStorageGBThreshold:
    Type: Number
    Default: 10
    Description: Default free storage threshold in GB (alert when below this value)

  DefaultDiskThreshold:
    Type: Number
    Default: 80
    Description: Default disk utilization threshold (%)

  Environment:
    Type: String
    Default: production
    AllowedValues: [development, staging, production]
    Description: Deployment environment (development / staging / production)

Mappings:
  LambdaConfig:
    Settings:
      Runtime: python3.12
      Timeout: 300
      MemorySize: 256
  # Full name -> short abbreviation for resource naming
  EnvShortName:
    development:
      short: dev
    staging:
      short: stg
    production:
      short: prod

Resources:

  # ════════════════════════════════════════════
  # DynamoDB 테이블 (api_handler 데이터 저장소)
  # ════════════════════════════════════════════

  CustomersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub
        - aws-monitoring-customers-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
      Tags:
        - Key: ManagedBy
          Value: AlarmManager

  AccountsTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub
        - aws-monitoring-accounts-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: customer_id
          AttributeType: S
        - AttributeName: account_id
          AttributeType: S
      KeySchema:
        - AttributeName: customer_id
          KeyType: HASH
        - AttributeName: account_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: account_id-index
          KeySchema:
            - AttributeName: account_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: ManagedBy
          Value: AlarmManager

  ThresholdOverridesTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub
        - aws-monitoring-threshold-overrides-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: scope_id    # "customer_id:cust-001" 또는 "resource_id:i-12345"
          AttributeType: S
        - AttributeName: metric_key  # "CPU", "FreeMemoryGB" 등
          AttributeType: S
      KeySchema:
        - AttributeName: scope_id
          KeyType: HASH
        - AttributeName: metric_key
          KeyType: RANGE
      Tags:
        - Key: ManagedBy
          Value: AlarmManager

  # ════════════════════════════════════════════
  # API Handler Lambda + API Gateway
  # ════════════════════════════════════════════

  JobStatusTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub
        - aws-monitoring-job-status-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: job_id
          AttributeType: S
      KeySchema:
        - AttributeName: job_id
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: ManagedBy
          Value: AlarmManager

  MonitorRunHistoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub
        - aws-monitoring-monitor-runs-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: scope
          AttributeType: S
        - AttributeName: started_at
          AttributeType: S
        - AttributeName: run_id
          AttributeType: S
      KeySchema:
        - AttributeName: scope
          KeyType: HASH
        - AttributeName: started_at
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: run_id-index
          KeySchema:
            - AttributeName: run_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true
      Tags:
        - Key: ManagedBy
          Value: AlarmManager

  ResourceInventoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub
        - aws-monitoring-resource-inventory-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: resource_id
          AttributeType: S
        - AttributeName: account_id
          AttributeType: S
        - AttributeName: customer_id
          AttributeType: S
      KeySchema:
        - AttributeName: resource_id
          KeyType: HASH
        - AttributeName: account_id
          KeyType: RANGE
      GlobalSecondaryIndexes:
        - IndexName: customer_id-index
          KeySchema:
            - AttributeName: customer_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
        - IndexName: account_id-index
          KeySchema:
            - AttributeName: account_id
              KeyType: HASH
          Projection:
            ProjectionType: ALL
      Tags:
        - Key: ManagedBy
          Value: AlarmManager

  BulkOperationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub
        - aws-monitoring-engine-bulk-dlq-${EnvShort}.fifo
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      FifoQueue: true
      MessageRetentionPeriod: 1209600

  BulkOperationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub
        - aws-monitoring-engine-bulk-${EnvShort}.fifo
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      FifoQueue: true
      ContentBasedDeduplication: false
      VisibilityTimeout: 900
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt BulkOperationDLQ.Arn
        maxReceiveCount: 3

  ApiHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub
        - aws-monitoring-engine-api-handler-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: REST API handler for Alarm Manager frontend
      Runtime: !FindInMap [LambdaConfig, Settings, Runtime]
      Timeout: 30
      MemorySize: 256
      Handler: lambda_handler.lambda_handler
      Role: !GetAtt ApiHandlerRole.Arn
      Layers:
        - !Ref CommonLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/api_handler.zip
      Environment:
        Variables:
          CUSTOMERS_TABLE: !Ref CustomersTable
          ACCOUNTS_TABLE: !Ref AccountsTable
          THRESHOLD_OVERRIDES_TABLE: !Ref ThresholdOverridesTable
          JOB_STATUS_TABLE: !Ref JobStatusTable
          MONITOR_RUN_HISTORY_TABLE: !Ref MonitorRunHistoryTable
          RESOURCE_INVENTORY_TABLE: !Ref ResourceInventoryTable
          BULK_OPERATION_QUEUE_URL: !Ref BulkOperationQueue
          API_STAGE: !FindInMap [EnvShortName, !Ref Environment, short]
          DAILY_MONITOR_FUNCTION_NAME: !Ref DailyMonitorFunction

  ApiHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - aws-monitoring-engine-api-handler-role-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: ApiHandlerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:DeleteItem
                  - dynamodb:Query
                  - dynamodb:Scan
                Resource:
                  - !GetAtt CustomersTable.Arn
                  - !GetAtt AccountsTable.Arn
                  - !Sub "${AccountsTable.Arn}/index/*"
                  - !GetAtt ThresholdOverridesTable.Arn
                  - !GetAtt JobStatusTable.Arn
                  - !GetAtt MonitorRunHistoryTable.Arn
                  - !Sub "${MonitorRunHistoryTable.Arn}/index/*"
                  - !GetAtt ResourceInventoryTable.Arn
                  - !Sub "${ResourceInventoryTable.Arn}/index/*"
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt BulkOperationQueue.Arn
              - Effect: Allow
                Action:
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:ListTagsForResource
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:TagResource
                  - cloudwatch:ListMetrics
                Resource: "*"
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeTags
                  - ec2:CreateTags
                  - ec2:DescribeNatGateways
                  - rds:DescribeDBInstances
                  - rds:ListTagsForResource
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTags
                  - lambda:ListFunctions
                  - lambda:ListTags
                  - s3:ListAllMyBuckets
                  - s3:GetBucketTagging
                  - s3:GetBucketLocation
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticache:DescribeCacheClusters
                  - elasticache:ListTagsForResource
                Resource: "*"
              # 모니터링 토글(Resource Groups Tagging API) + 확장 리소스 디스커버리.
              # RGT tag_resources는 tag:TagResources + 서비스별 태깅 권한을 위임 호출한다.
              # (거버넌스 AP-19: 태깅 경로가 권한을 빠뜨리면 토글이 영구 AccessDenied로 고착.)
              - Effect: Allow
                Action:
                  - tag:TagResources
                  # RGT가 위임하는 서비스별 태그 쓰기 (ec2:CreateTags는 위에 이미 있음)
                  - rds:AddTagsToResource
                  - elasticache:AddTagsToResource
                  - lambda:TagResource
                  - s3:PutBucketTagging
                  - elasticloadbalancing:AddTags
                  - sqs:TagQueue
                  - dynamodb:TagResource
                  - elasticfilesystem:TagResource
                  - es:AddTags
                  - ecs:TagResource
                  # 확장 리소스 디스커버리 read (api_handler sync_resources용)
                  - sqs:ListQueues
                  - sqs:ListQueueTags
                  - dynamodb:ListTables
                  - dynamodb:DescribeTable
                  - dynamodb:ListTagsOfResource
                  - elasticfilesystem:DescribeFileSystems
                  - ecs:ListClusters
                  - ecs:ListServices
                  - ecs:DescribeServices
                  - ecs:ListTagsForResource
                  - es:ListDomainNames
                  - es:DescribeDomains
                  - es:ListTags
                Resource: "*"
              # Batch 2 확장 디스커버리(read) + 모니터링 토글(RGT 위임 태그 write).
              - Effect: Allow
                Action:
                  # read (api_handler sync_resources 디스커버리)
                  - apigateway:GET
                  - acm:ListCertificates
                  - acm:DescribeCertificate
                  - backup:ListBackupVaults
                  - backup:ListTags
                  - mq:ListBrokers
                  - mq:DescribeBroker
                  - kafka:ListClustersV2
                  - wafv2:ListWebACLs
                  - wafv2:ListTagsForResource
                  - directconnect:DescribeConnections
                  - directconnect:DescribeTags
                  - sagemaker:ListEndpoints
                  - sagemaker:ListTags
                  - sns:ListTopics
                  - sns:ListTagsForResource
                  - ec2:DescribeVpnConnections
                  - cloudfront:ListDistributions
                  - cloudfront:ListTagsForResource
                  - route53:ListHealthChecks
                  - route53:ListTagsForResource
                  # tag write (RGT가 위임; ec2:CreateTags는 위에 이미 있어 VPN 커버)
                  - acm:AddTagsToCertificate
                  - backup:TagResource
                  - mq:CreateTags
                  - kafka:TagResource
                  - wafv2:TagResource
                  - directconnect:TagResource
                  - sagemaker:AddTags
                  - sns:TagResource
                  - cloudfront:TagResource
                  - route53:ChangeTagsForResource
                Resource: "*"
              # APIGW 태깅 하드닝(별도 statement): RGT가 API Gateway 태깅을 REST
              # 동사로 위임한다 — v2(HTTP/WS)는 PATCH /apis/{id}, v1(REST)은 /tags·
              # /restapis 경로. PATCH/POST/PUT은 관리플레인 변경 동사라 ① Resource를
              # API Gateway 경로로 한정하고 ② aws:TagKeys 조건으로 'Monitoring 태그가
              # 포함된 요청'만 허용한다(태그 키 없는 순수 config 변경 요청은 차단).
              - Effect: Allow
                Action:
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:POST
                  - apigateway:TagResource
                Resource:
                  - "arn:aws:apigateway:*::/apis"
                  - "arn:aws:apigateway:*::/apis/*"
                  - "arn:aws:apigateway:*::/restapis"
                  - "arn:aws:apigateway:*::/restapis/*"
                  - "arn:aws:apigateway:*::/tags/*"
                Condition:
                  "Null":
                    "aws:TagKeys": "false"
                  "ForAllValues:StringEquals":
                    "aws:TagKeys":
                      - "Monitoring"
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: "arn:aws:iam::*:role/AlarmManagerRole"
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource: !GetAtt DailyMonitorFunction.Arn

  SqsWorkerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub
        - aws-monitoring-engine-sqs-worker-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: SQS worker for bulk alarm operations
      Runtime: !FindInMap [LambdaConfig, Settings, Runtime]
      Timeout: 900
      MemorySize: 256
      Handler: lambda_handler.lambda_handler
      Role: !GetAtt SqsWorkerRole.Arn
      Layers:
        - !Ref CommonLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/sqs_worker.zip
      Environment:
        Variables:
          JOB_STATUS_TABLE: !Ref JobStatusTable
          BULK_OPERATION_QUEUE_URL: !Ref BulkOperationQueue

  SqsWorkerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub
        - aws-monitoring-engine-sqs-worker-role-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SqsWorkerPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:UpdateItem
                Resource: !GetAtt JobStatusTable.Arn
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource: !GetAtt BulkOperationQueue.Arn
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:DeleteAlarms
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:ListTagsForResource
                  - cloudwatch:TagResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: "arn:aws:iam::*:role/AlarmManagerRole"

  SqsWorkerEventSourceMapping:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt BulkOperationQueue.Arn
      FunctionName: !GetAtt SqsWorkerFunction.Arn
      BatchSize: 10
      FunctionResponseTypes:
        - ReportBatchItemFailures

  AlarmManagerHttpApi:
    Type: AWS::ApiGatewayV2::Api
    Properties:
      Name: !Sub
        - alarm-manager-api-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      ProtocolType: HTTP
      CorsConfiguration:
        AllowOrigins:
          - "*"
        AllowHeaders:
          - Content-Type
          - x-api-key
        AllowMethods:
          - GET
          - POST
          - PUT
          - DELETE
          - OPTIONS

  AlarmManagerApiIntegration:
    Type: AWS::ApiGatewayV2::Integration
    Properties:
      ApiId: !Ref AlarmManagerHttpApi
      IntegrationType: AWS_PROXY
      IntegrationUri: !GetAtt ApiHandlerFunction.Arn
      PayloadFormatVersion: "2.0"

  AlarmManagerApiRoute:
    Type: AWS::ApiGatewayV2::Route
    Properties:
      ApiId: !Ref AlarmManagerHttpApi
      RouteKey: "$default"
      Target: !Sub "integrations/${AlarmManagerApiIntegration}"

  AlarmManagerApiStage:
    Type: AWS::ApiGatewayV2::Stage
    Properties:
      ApiId: !Ref AlarmManagerHttpApi
      StageName: !FindInMap [EnvShortName, !Ref Environment, short]
      AutoDeploy: true

  ApiHandlerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt ApiHandlerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${AlarmManagerHttpApi}/*"

  # -- Lambda Layer: common module ------------
  CommonLayer:
    Type: AWS::Lambda::LayerVersion
    Properties:
      LayerName: !Sub
        - aws-monitoring-engine-common-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: AWS Monitoring Engine common modules (tag_resolver, sns_notifier, collectors)
      Content:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/common_layer.zip
      CompatibleRuntimes:
        - python3.12

  # -- Daily Monitor Lambda -------------------
  DailyMonitorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub
        - aws-monitoring-engine-daily-monitor-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: EC2/RDS/ELB daily metric check and threshold alert
      Runtime: !FindInMap [LambdaConfig, Settings, Runtime]
      Timeout: !FindInMap [LambdaConfig, Settings, Timeout]
      MemorySize: !FindInMap [LambdaConfig, Settings, MemorySize]
      Handler: lambda_handler.lambda_handler
      Role: !GetAtt MonitoringEngineRole.Arn
      Layers:
        - !Ref CommonLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/daily_monitor.zip
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_ALERT: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_REMEDIATION: !Ref RemediationAlertTopic
          SNS_TOPIC_ARN_LIFECYCLE: !Ref LifecycleAlertTopic
          SNS_TOPIC_ARN_ERROR: !Ref ErrorAlertTopic
          SNS_TOPIC_ARN_GLOBAL_ALERT: !GetAtt GlobalAlertSetup.TopicArn
          DEFAULT_CPU_THRESHOLD: !Ref DefaultCpuThreshold
          DEFAULT_MEMORY_THRESHOLD: !Ref DefaultMemoryThreshold
          DEFAULT_CONNECTIONS_THRESHOLD: !Ref DefaultConnectionsThreshold
          DEFAULT_FREE_MEMORY_GB_THRESHOLD: !Ref DefaultFreeMemoryGBThreshold
          DEFAULT_FREE_STORAGE_GB_THRESHOLD: !Ref DefaultFreeStorageGBThreshold
          DEFAULT_DISK_THRESHOLD: !Ref DefaultDiskThreshold
          ENVIRONMENT: !FindInMap [EnvShortName, !Ref Environment, short]
          ACCOUNTS_TABLE: !Ref AccountsTable
          RESOURCE_INVENTORY_TABLE: !Ref ResourceInventoryTable
          MONITOR_RUN_HISTORY_TABLE: !Ref MonitorRunHistoryTable
          JOB_STATUS_TABLE: !Ref JobStatusTable

  # -- Dead Letter Queue: Remediation Handler (RISK-08) --
  RemediationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub
        - aws-monitoring-engine-remediation-dlq-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      MessageRetentionPeriod: 1209600  # 14일 (최대)
      Tags:
        - Key: ManagedBy
          Value: AlarmManager

  # -- CloudWatch Alarm: DLQ 메시지 축적 감지 --
  RemediationDLQAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub
        - "[RemediationDLQ] 처리 실패 이벤트 축적 (${EnvShort})"
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      AlarmDescription: "Remediation Handler 실패 이벤트가 DLQ에 쌓임. 즉시 확인 필요."
      Namespace: AWS/SQS
      MetricName: ApproximateNumberOfMessagesVisible
      Dimensions:
        - Name: QueueName
          Value: !GetAtt RemediationDLQ.QueueName
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      TreatMissingData: notBreaching
      AlarmActions:
        - !Ref ErrorAlertTopic
      OKActions:
        - !Ref ErrorAlertTopic

  # -- Remediation Handler Lambda -------------
  RemediationHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub
        - aws-monitoring-engine-remediation-handler-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: CloudTrail event-based auto remediation and lifecycle alerts
      Runtime: !FindInMap [LambdaConfig, Settings, Runtime]
      Timeout: !FindInMap [LambdaConfig, Settings, Timeout]
      MemorySize: !FindInMap [LambdaConfig, Settings, MemorySize]
      Handler: lambda_handler.lambda_handler
      Role: !GetAtt RemediationHandlerRole.Arn
      Layers:
        - !Ref CommonLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/remediation_handler.zip
      DeadLetterConfig:
        TargetArn: !GetAtt RemediationDLQ.Arn
      Environment:
        Variables:
          SNS_TOPIC_ARN: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_ALERT: !Ref MonitoringAlertTopic
          SNS_TOPIC_ARN_REMEDIATION: !Ref RemediationAlertTopic
          SNS_TOPIC_ARN_LIFECYCLE: !Ref LifecycleAlertTopic
          SNS_TOPIC_ARN_ERROR: !Ref ErrorAlertTopic
          SNS_TOPIC_ARN_GLOBAL_ALERT: !GetAtt GlobalAlertSetup.TopicArn
          DEFAULT_CPU_THRESHOLD: !Ref DefaultCpuThreshold
          DEFAULT_MEMORY_THRESHOLD: !Ref DefaultMemoryThreshold
          DEFAULT_CONNECTIONS_THRESHOLD: !Ref DefaultConnectionsThreshold
          DEFAULT_FREE_MEMORY_GB_THRESHOLD: !Ref DefaultFreeMemoryGBThreshold
          DEFAULT_FREE_STORAGE_GB_THRESHOLD: !Ref DefaultFreeStorageGBThreshold
          DEFAULT_DISK_THRESHOLD: !Ref DefaultDiskThreshold
          ENVIRONMENT: !FindInMap [EnvShortName, !Ref Environment, short]

  # -- Orchestrator Lambda -------------------
  OrchestratorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub
        - aws-monitoring-engine-orchestrator-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: Daily Monitor Orchestrator — reads account list and fans out to Worker Lambdas
      Runtime: !FindInMap [LambdaConfig, Settings, Runtime]
      Timeout: 60
      MemorySize: 128
      Handler: orchestrator.lambda_handler
      Role: !GetAtt OrchestratorRole.Arn
      Layers:
        - !Ref CommonLayer
      Code:
        S3Bucket: !Ref DeploymentBucket
        S3Key: !Sub ${CodeVersion}/daily_monitor.zip
      Environment:
        Variables:
          WORKER_FUNCTION_NAME: !Ref DailyMonitorFunction
          MONITORED_ACCOUNTS: ""   # JSON array — Phase 2에서 DynamoDB로 교체

  # -- EventBridge Scheduler: Daily Monitor (Orchestrator 경유) --
  DailyMonitorSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub
        - daily-monitor-schedule-${EnvShort}
        - EnvShort: !FindInMap [EnvShortName, !Ref Environment, short]
      Description: Run Daily Monitor every day at 09:00 KST (00:00 UTC)
