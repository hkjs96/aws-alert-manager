                Resource: !GetAtt JobStatusTable.Arn
              # -- 멀티 어카운트: 대상 계정 Role AssumeRole --
              - Effect: Allow
                Action:
                  - sts:AssumeRole
                Resource: "arn:aws:iam::*:role/AlarmManagerRole"
