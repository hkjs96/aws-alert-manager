                  - apigateway:GetTags
                Resource: "*"
              - Effect: Allow
                Action:
                  - apigatewayv2:GetApis
                  - apigatewayv2:GetApi
                  - apigatewayv2:GetTags
                Resource: "*"
              - Effect: Allow
                Action:
                  - acm:ListCertificates
                  - acm:DescribeCertificate
                  - acm:ListTagsForCertificate
                Resource: "*"
              - Effect: Allow
                Action:
                  - backup:ListBackupVaults
                  - backup:DescribeBackupVault
                  - backup:ListTags
                Resource: "*"
              - Effect: Allow
                Action:
                  - mq:ListBrokers
                  - mq:DescribeBroker
                Resource: "*"
              - Effect: Allow
                Action:
                  - es:ListDomainNames
                  - es:DescribeDomains
                  - es:ListTags
                Resource: "*"
              # -- Extended Resource Monitoring (12 new types) ---
              - Effect: Allow
                Action:
                  - sqs:ListQueues
                  - sqs:ListQueueTags
                  - sqs:GetQueueUrl
                Resource: "*"
              - Effect: Allow
                Action:
                  - ecs:ListClusters
                  - ecs:ListServices
                  - ecs:DescribeServices
                  - ecs:ListTagsForResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - kafka:ListClustersV2
                  - kafka:ListTagsForResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - dynamodb:ListTables
                  - dynamodb:ListTagsOfResource
                  - dynamodb:DescribeTable
                Resource: "*"
              - Effect: Allow
                Action:
                  - cloudfront:ListDistributions
                  - cloudfront:ListTagsForResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - wafv2:ListWebACLs
                  - wafv2:ListTagsForResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - route53:ListHealthChecks
                  - route53:ListTagsForResource
                  - route53:GetHealthCheck
                Resource: "*"
              - Effect: Allow
                Action:
                  - directconnect:DescribeConnections
                  - directconnect:DescribeTags
                Resource: "*"
              - Effect: Allow
                Action:
                  - elasticfilesystem:DescribeFileSystems
                Resource: "*"
              - Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                  - s3:GetBucketTagging
                  - s3:GetBucketLocation
                Resource: "*"
              - Effect: Allow
                Action:
                  - sagemaker:ListEndpoints
                  - sagemaker:DescribeEndpoint
                  - sagemaker:ListTags
                Resource: "*"
              - Effect: Allow
                Action:
                  - sns:ListTopics
                  - sns:ListTagsForResource
                  - sns:GetTopicAttributes
                Resource: "*"
              - Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              # CloudWatch 읽기 — Resource: "*" 불가피 (Describe/List는 리소스 레벨 권한 미지원)
              - Effect: Allow
                Action:
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:GetMetricData
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:ListMetrics
                  - cloudwatch:ListTagsForResource
                Resource: "*"
              # CloudWatch 쓰기 — ManagedBy=AlarmManager 태그가 있는 알람만 삭제 가능
              # (수동 생성 알람 실수 삭제 방지)
              - Effect: Allow
                Action:
                  - cloudwatch:DeleteAlarms
                Resource: "*"
                Condition:
                  StringEquals:
                    "aws:ResourceTag/ManagedBy": "AlarmManager"
              # 알람 생성 + 태깅은 제한 없음 (신규 알람은 태그 미부착 상태로 시작)
              - Effect: Allow
                Action:
                  - cloudwatch:PutMetricAlarm
                  - cloudwatch:TagResource
                Resource: "*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource:
                  - !Ref MonitoringAlertTopic
                  - !Ref ErrorAlertTopic
                  - !GetAtt GlobalAlertSetup.TopicArn
              # -- DynamoDB: AccountsTable 메타데이터 조회 (inventory sync 전 단계) --
              - Effect: Allow
                Action:
                  - dynamodb:Query
                  - dynamodb:GetItem
                  - dynamodb:Scan
